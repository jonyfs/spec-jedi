name: validate

on:
  pull_request:
    branches: [main]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

jobs:
  # Constitution Principle XIII: prove cross-platform claims in CI rather
  # than just asserting them in docs. bash ships on all three GitHub-hosted
  # runners (Windows via the bundled Git Bash), so this matrix exercises
  # scripts/validate.sh on Linux, macOS, and Windows.
  lint:
    name: lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Run structural + constitution validation
        shell: bash
        run: ./scripts/validate.sh

  # Also exercise the native PowerShell script directly (not just bash-on-
  # Windows), since Principle XIII requires the .ps1 counterpart to actually
  # work, not just exist.
  lint-windows-native:
    name: lint (windows-latest, native PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run structural + constitution validation (PowerShell)
        shell: pwsh
        run: ./scripts/validate.ps1

  # Constitution Principle XVIII: the installer must be validated, not just
  # asserted to work. Runs install.sh against a scratch directory on all
  # three OSes and confirms all 12 specjedi-* skills land with no speckit-*
  # contamination.
  install-test:
    name: install-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install into a scratch directory and verify
        shell: bash
        run: |
          ./scripts/install.sh /tmp/spec-jedi-install-test
          count=$(find /tmp/spec-jedi-install-test/.claude/skills -maxdepth 1 -name 'specjedi-*' -type d | wc -l)
          echo "Installed skill count: $count"
          if [ "$count" -lt 1 ]; then
            echo "FAIL: no specjedi-* skills installed"
            exit 1
          fi
          if find /tmp/spec-jedi-install-test -iname 'speckit-*' | grep -q .; then
            echo "FAIL: speckit-* bootstrap tooling leaked into the install"
            exit 1
          fi

  # Native PowerShell counterpart of install-test, same reasoning as
  # lint-windows-native.
  install-test-windows-native:
    name: install-test (windows-latest, native PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install into a scratch directory and verify (PowerShell)
        shell: pwsh
        run: |
          ./scripts/install.ps1 -TargetDir C:\spec-jedi-install-test
          $count = (Get-ChildItem -Path C:\spec-jedi-install-test\.claude\skills -Directory -Filter "specjedi-*").Count
          Write-Host "Installed skill count: $count"
          if ($count -lt 1) {
            Write-Host "FAIL: no specjedi-* skills installed"
            exit 1
          }
          $leaked = Get-ChildItem -Path C:\spec-jedi-install-test -Recurse -Filter "speckit-*" -ErrorAction SilentlyContinue
          if ($leaked) {
            Write-Host "FAIL: speckit-* bootstrap tooling leaked into the install"
            exit 1
          }

  # specs/016-codex-cli-install: proves --harness codex-cli for real,
  # mirroring install-test's own reasoning exactly but asserting against
  # .agents/skills instead of .claude/skills.
  install-test-codex-cli:
    name: install-test-codex-cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install into a scratch directory and verify (codex-cli)
        shell: bash
        run: |
          ./scripts/install.sh /tmp/spec-jedi-install-test-codex --harness codex-cli
          count=$(find /tmp/spec-jedi-install-test-codex/.agents/skills -maxdepth 1 -name 'specjedi-*' -type d | wc -l)
          echo "Installed skill count: $count"
          if [ "$count" -lt 1 ]; then
            echo "FAIL: no specjedi-* skills installed under .agents/skills"
            exit 1
          fi
          if find /tmp/spec-jedi-install-test-codex -iname 'speckit-*' | grep -q .; then
            echo "FAIL: speckit-* bootstrap tooling leaked into the install"
            exit 1
          fi

  # Native PowerShell counterpart of install-test-codex-cli, same
  # reasoning as install-test-windows-native.
  install-test-codex-cli-windows-native:
    name: install-test-codex-cli (windows-latest, native PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install into a scratch directory and verify (codex-cli, PowerShell)
        shell: pwsh
        run: |
          ./scripts/install.ps1 -TargetDir C:\spec-jedi-install-test-codex -Harness codex-cli
          $count = (Get-ChildItem -Path C:\spec-jedi-install-test-codex\.agents\skills -Directory -Filter "specjedi-*").Count
          Write-Host "Installed skill count: $count"
          if ($count -lt 1) {
            Write-Host "FAIL: no specjedi-* skills installed under .agents/skills"
            exit 1
          }
          $leaked = Get-ChildItem -Path C:\spec-jedi-install-test-codex -Recurse -Filter "speckit-*" -ErrorAction SilentlyContinue
          if ($leaked) {
            Write-Host "FAIL: speckit-* bootstrap tooling leaked into the install"
            exit 1
          }

  # specs/019-trae-support: proves --harness trae for real, mirroring
  # install-test-codex-cli's own reasoning exactly but asserting against
  # .trae/skills instead of .agents/skills.
  install-test-trae:
    name: install-test-trae (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install into a scratch directory and verify (trae)
        shell: bash
        run: |
          ./scripts/install.sh /tmp/spec-jedi-install-test-trae --harness trae
          count=$(find /tmp/spec-jedi-install-test-trae/.trae/skills -maxdepth 1 -name 'specjedi-*' -type d | wc -l)
          echo "Installed skill count: $count"
          if [ "$count" -lt 1 ]; then
            echo "FAIL: no specjedi-* skills installed under .trae/skills"
            exit 1
          fi
          if find /tmp/spec-jedi-install-test-trae -iname 'speckit-*' | grep -q .; then
            echo "FAIL: speckit-* bootstrap tooling leaked into the install"
            exit 1
          fi

  # Native PowerShell counterpart of install-test-trae, same reasoning as
  # install-test-codex-cli-windows-native.
  install-test-trae-windows-native:
    name: install-test-trae (windows-latest, native PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install into a scratch directory and verify (trae, PowerShell)
        shell: pwsh
        run: |
          ./scripts/install.ps1 -TargetDir C:\spec-jedi-install-test-trae -Harness trae
          $count = (Get-ChildItem -Path C:\spec-jedi-install-test-trae\.trae\skills -Directory -Filter "specjedi-*").Count
          Write-Host "Installed skill count: $count"
          if ($count -lt 1) {
            Write-Host "FAIL: no specjedi-* skills installed under .trae/skills"
            exit 1
          }
          $leaked = Get-ChildItem -Path C:\spec-jedi-install-test-trae -Recurse -Filter "speckit-*" -ErrorAction SilentlyContinue
          if ($leaked) {
            Write-Host "FAIL: speckit-* bootstrap tooling leaked into the install"
            exit 1
          }

  # specs/023-full-harness-coverage: Antigravity shares Codex CLI's exact
  # .agents/skills convention (confirmed against Google's own Codelabs/
  # Developer docs) so it needed zero new installer branch logic -- same
  # precedent as OpenCode/Warp reusing an existing target directory. This
  # job proves that reuse actually holds for the antigravity value too,
  # not just codex-cli.
  install-test-antigravity:
    name: install-test-antigravity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install into a scratch directory and verify (antigravity)
        shell: bash
        run: |
          ./scripts/install.sh /tmp/spec-jedi-install-test-antigravity --harness antigravity
          count=$(find /tmp/spec-jedi-install-test-antigravity/.agents/skills -maxdepth 1 -name 'specjedi-*' -type d | wc -l)
          echo "Installed skill count: $count"
          if [ "$count" -lt 1 ]; then
            echo "FAIL: no specjedi-* skills installed under .agents/skills"
            exit 1
          fi
          if find /tmp/spec-jedi-install-test-antigravity -iname 'speckit-*' | grep -q .; then
            echo "FAIL: speckit-* bootstrap tooling leaked into the install"
            exit 1
          fi

  # Native PowerShell counterpart of install-test-antigravity.
  install-test-antigravity-windows-native:
    name: install-test-antigravity (windows-latest, native PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install into a scratch directory and verify (antigravity, PowerShell)
        shell: pwsh
        run: |
          ./scripts/install.ps1 -TargetDir C:\spec-jedi-install-test-antigravity -Harness antigravity
          $count = (Get-ChildItem -Path C:\spec-jedi-install-test-antigravity\.agents\skills -Directory -Filter "specjedi-*").Count
          Write-Host "Installed skill count: $count"
          if ($count -lt 1) {
            Write-Host "FAIL: no specjedi-* skills installed under .agents/skills"
            exit 1
          }
          $leaked = Get-ChildItem -Path C:\spec-jedi-install-test-antigravity -Recurse -Filter "speckit-*" -ErrorAction SilentlyContinue
          if ($leaked) {
            Write-Host "FAIL: speckit-* bootstrap tooling leaked into the install"
            exit 1
          }

  # specs/023-full-harness-coverage: the 14 harnesses with no native
  # skills-directory scan (only a project-root rules file, a small rules
  # directory, or -- Cody -- a custom-commands JSON file). One matrix job
  # asserts each harness's own exact bridge path independently (visible
  # as a separate matrix row in the Actions UI, same "dedicated per
  # harness" spirit as install-test-codex-cli/-trae) without 14 near-
  # duplicate hand-written blocks. mode selects which shape of assertion
  # applies: "dir" (a directory of one .md per skill), "single" (one
  # combined index file), or "json" (Cody's custom-commands file).
  install-test-bridge-harnesses:
    name: install-test-bridge (${{ matrix.harness }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - { harness: cursor, mode: dir, path: .cursor/rules }
          - { harness: windsurf, mode: dir, path: .windsurf/rules }
          - { harness: cline, mode: dir, path: .clinerules }
          - { harness: continue, mode: dir, path: .continue/rules }
          - { harness: amazon-q, mode: dir, path: .amazonq/rules }
          - { harness: jetbrains-ai, mode: dir, path: .aiassistant/rules }
          - { harness: tabnine, mode: dir, path: .tabnine/guidelines }
          - { harness: gemini-cli, mode: single, path: GEMINI.md }
          - { harness: zed, mode: single, path: .rules }
          - { harness: replit, mode: single, path: replit.md }
          - { harness: aider, mode: single, path: CONVENTIONS.md }
          - { harness: copilot, mode: single, path: .github/copilot-instructions.md }
          - { harness: devin, mode: single, path: .devin.md }
          - { harness: cody, mode: json, path: .vscode/cody.json }
    steps:
      - uses: actions/checkout@v4
      - name: Install and verify bridge output (${{ matrix.harness }})
        shell: bash
        run: |
          dest="/tmp/spec-jedi-install-test-${{ matrix.harness }}"
          rm -rf "$dest"
          ./scripts/install.sh "$dest" --harness "${{ matrix.harness }}"

          skill_count=$(find "$dest/.claude/skills" -maxdepth 1 -name 'specjedi-*' -type d | wc -l)
          echo "Canonical .claude/skills count: $skill_count"
          if [ "$skill_count" -lt 1 ]; then
            echo "FAIL: no specjedi-* skills installed under .claude/skills"
            exit 1
          fi

          bridge_path="$dest/${{ matrix.path }}"
          case "${{ matrix.mode }}" in
            dir)
              bridge_count=$(find "$bridge_path" -maxdepth 1 -name '*.md' -type f | wc -l)
              echo "Bridge files under ${{ matrix.path }}: $bridge_count"
              if [ "$bridge_count" -lt 1 ]; then
                echo "FAIL: no bridge .md files under ${{ matrix.path }}"
                exit 1
              fi
              if ! grep -rq 'specjedi-' "$bridge_path"; then
                echo "FAIL: bridge files under ${{ matrix.path }} don't reference any specjedi-* skill"
                exit 1
              fi
              ;;
            single)
              if [ ! -f "$bridge_path" ]; then
                echo "FAIL: bridge file ${{ matrix.path }} not found"
                exit 1
              fi
              if ! grep -q 'specjedi-onboard' "$bridge_path"; then
                echo "FAIL: ${{ matrix.path }} does not reference specjedi-onboard"
                exit 1
              fi
              ;;
            json)
              if [ ! -f "$bridge_path" ]; then
                echo "FAIL: ${{ matrix.path }} not found"
                exit 1
              fi
              first_char=$(head -c 1 "$bridge_path")
              last_char=$(tail -c 2 "$bridge_path" | head -c 1)
              if [ "$first_char" != "{" ] || [ "$last_char" != "}" ]; then
                echo "FAIL: ${{ matrix.path }} doesn't look like a JSON object"
                exit 1
              fi
              if ! grep -q 'specjedi-onboard' "$bridge_path"; then
                echo "FAIL: ${{ matrix.path }} does not reference specjedi-onboard"
                exit 1
              fi
              ;;
          esac

          if find "$dest" -iname 'speckit-*' | grep -q .; then
            echo "FAIL: speckit-* bootstrap tooling leaked into the install"
            exit 1
          fi
          echo "OK: ${{ matrix.harness }} (${{ matrix.mode }})"

  # Native PowerShell counterpart of install-test-bridge-harnesses, same
  # matrix and same assertions via install.ps1 instead of install.sh.
  install-test-bridge-harnesses-windows-native:
    name: install-test-bridge (${{ matrix.harness }}, windows-latest, native PowerShell)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { harness: cursor, mode: dir, path: .cursor\rules }
          - { harness: windsurf, mode: dir, path: .windsurf\rules }
          - { harness: cline, mode: dir, path: .clinerules }
          - { harness: continue, mode: dir, path: .continue\rules }
          - { harness: amazon-q, mode: dir, path: .amazonq\rules }
          - { harness: jetbrains-ai, mode: dir, path: .aiassistant\rules }
          - { harness: tabnine, mode: dir, path: .tabnine\guidelines }
          - { harness: gemini-cli, mode: single, path: GEMINI.md }
          - { harness: zed, mode: single, path: .rules }
          - { harness: replit, mode: single, path: replit.md }
          - { harness: aider, mode: single, path: CONVENTIONS.md }
          - { harness: copilot, mode: single, path: .github\copilot-instructions.md }
          - { harness: devin, mode: single, path: .devin.md }
          - { harness: cody, mode: json, path: .vscode\cody.json }
    steps:
      - uses: actions/checkout@v4
      - name: Install and verify bridge output (${{ matrix.harness }}, PowerShell)
        shell: pwsh
        run: |
          $dest = "C:\spec-jedi-install-test-${{ matrix.harness }}"
          Remove-Item -Recurse -Force $dest -ErrorAction SilentlyContinue
          ./scripts/install.ps1 -TargetDir $dest -Harness "${{ matrix.harness }}"

          $skillCount = (Get-ChildItem -Path (Join-Path $dest ".claude\skills") -Directory -Filter "specjedi-*").Count
          Write-Host "Canonical .claude\skills count: $skillCount"
          if ($skillCount -lt 1) {
            Write-Host "FAIL: no specjedi-* skills installed under .claude\skills"
            exit 1
          }

          $bridgePath = Join-Path $dest "${{ matrix.path }}"
          switch ("${{ matrix.mode }}") {
            "dir" {
              $bridgeFiles = Get-ChildItem -Path $bridgePath -Filter "*.md" -ErrorAction SilentlyContinue
              Write-Host "Bridge files under ${{ matrix.path }}: $($bridgeFiles.Count)"
              if ($bridgeFiles.Count -lt 1) {
                Write-Host "FAIL: no bridge .md files under ${{ matrix.path }}"
                exit 1
              }
            }
            "single" {
              if (-not (Test-Path $bridgePath)) {
                Write-Host "FAIL: bridge file ${{ matrix.path }} not found"
                exit 1
              }
              if (-not (Select-String -Path $bridgePath -Pattern 'specjedi-onboard' -Quiet)) {
                Write-Host "FAIL: ${{ matrix.path }} does not reference specjedi-onboard"
                exit 1
              }
            }
            "json" {
              if (-not (Test-Path $bridgePath)) {
                Write-Host "FAIL: ${{ matrix.path }} not found"
                exit 1
              }
              try {
                Get-Content -Path $bridgePath -Raw | ConvertFrom-Json | Out-Null
              } catch {
                Write-Host "FAIL: ${{ matrix.path }} is not valid JSON"
                exit 1
              }
            }
          }

          $leaked = Get-ChildItem -Path $dest -Recurse -Filter "speckit-*" -ErrorAction SilentlyContinue
          if ($leaked) {
            Write-Host "FAIL: speckit-* bootstrap tooling leaked into the install"
            exit 1
          }
          Write-Host "OK: ${{ matrix.harness }} (${{ matrix.mode }})"

  # specs/021-harness-auto-detection: proves --harness is now optional and
  # correctly auto-selects a harness from detection signals, without
  # touching any existing explicit --harness job above.
  harness-auto-detect:
    name: harness-auto-detect (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Single-match detection (quickstart.md Scenario 1)
        shell: bash
        run: |
          rm -rf /tmp/detect-ci-single
          mkdir -p /tmp/detect-ci-single/.agents
          ./scripts/install.sh /tmp/detect-ci-single
          count=$(find /tmp/detect-ci-single/.agents/skills -maxdepth 1 -name 'specjedi-*' -type d | wc -l)
          if [ "$count" -lt 1 ]; then
            echo "FAIL: single-match detection did not install for codex-cli"
            exit 1
          fi
          echo "OK: single-match detection installed for codex-cli"
      - name: Multi-match --auto detection (quickstart.md Scenario 2)
        shell: bash
        run: |
          rm -rf /tmp/detect-ci-multi
          mkdir -p /tmp/detect-ci-multi/.claude /tmp/detect-ci-multi/.agents
          ./scripts/install.sh /tmp/detect-ci-multi --auto
          count=$(find /tmp/detect-ci-multi/.claude/skills -maxdepth 1 -name 'specjedi-*' -type d | wc -l)
          if [ "$count" -lt 1 ]; then
            echo "FAIL: multi-match --auto did not select the Recommended (claude-code) candidate"
            exit 1
          fi
          echo "OK: multi-match --auto selected claude-code (Recommended, tiebreak)"

  # Native PowerShell counterpart of harness-auto-detect, same reasoning
  # as install-test-windows-native.
  harness-auto-detect-windows-native:
    name: harness-auto-detect (windows-latest, native PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Single-match detection (PowerShell)
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force C:\detect-ci-single -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path C:\detect-ci-single\.agents | Out-Null
          ./scripts/install.ps1 -TargetDir C:\detect-ci-single
          $count = (Get-ChildItem -Path C:\detect-ci-single\.agents\skills -Directory -Filter "specjedi-*").Count
          if ($count -lt 1) {
            Write-Host "FAIL: single-match detection did not install for codex-cli"
            exit 1
          }
          Write-Host "OK: single-match detection installed for codex-cli"
      - name: Multi-match -Auto detection (PowerShell)
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force C:\detect-ci-multi -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path C:\detect-ci-multi\.claude, C:\detect-ci-multi\.agents | Out-Null
          ./scripts/install.ps1 -TargetDir C:\detect-ci-multi -Auto
          $count = (Get-ChildItem -Path C:\detect-ci-multi\.claude\skills -Directory -Filter "specjedi-*").Count
          if ($count -lt 1) {
            Write-Host "FAIL: multi-match -Auto did not select the Recommended (claude-code) candidate"
            exit 1
          }
          Write-Host "OK: multi-match -Auto selected claude-code (Recommended, tiebreak)"

  # specs/017-opencode-support: OpenCode adds no new installer branch —
  # verified (research.md) that it natively scans .claude/skills/ and
  # .agents/skills/, the exact paths install-test/install-test-codex-cli
  # already prove. This job re-installs via both existing harnesses and
  # asserts specifically against OpenCode's own documented rules (path
  # shape + name/description presence + the lowercase-hyphenated,
  # directory-matching name format), not just the generic frontmatter
  # check those other jobs already run.
  opencode-compatibility:
    name: opencode-compatibility (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Verify claude-code install satisfies OpenCode's convention
        shell: bash
        run: |
          ./scripts/install.sh /tmp/opencode-check-claude --harness claude-code
          fail=0
          for dir in /tmp/opencode-check-claude/.claude/skills/specjedi-*/; do
            name="$(basename "$dir")"
            if [ ! -f "${dir}SKILL.md" ]; then
              echo "FAIL: $name has no SKILL.md at the path OpenCode scans"
              fail=1
            fi
            fm_name="$(grep -m1 '^name:' "${dir}SKILL.md" | sed -E 's/^name:[[:space:]]*//' | tr -d '[:space:]"'"'"'')"
            if [ "$name" != "$fm_name" ]; then
              echo "FAIL: $name directory does not match frontmatter name '$fm_name'"
              fail=1
            fi
            if ! echo "$name" | grep -qE '^[a-z0-9]+(-[a-z0-9]+)*$'; then
              echo "FAIL: $name does not satisfy OpenCode's lowercase-hyphenated name rule"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "opencode-compatibility (claude-code path): FAILED"
            exit 1
          fi
          echo "OK: claude-code install satisfies OpenCode's documented convention"
      - name: Verify codex-cli install satisfies OpenCode's convention
        shell: bash
        run: |
          ./scripts/install.sh /tmp/opencode-check-codex --harness codex-cli
          fail=0
          for dir in /tmp/opencode-check-codex/.agents/skills/specjedi-*/; do
            name="$(basename "$dir")"
            if [ ! -f "${dir}SKILL.md" ]; then
              echo "FAIL: $name has no SKILL.md at the path OpenCode scans"
              fail=1
            fi
            fm_name="$(grep -m1 '^name:' "${dir}SKILL.md" | sed -E 's/^name:[[:space:]]*//' | tr -d '[:space:]"'"'"'')"
            if [ "$name" != "$fm_name" ]; then
              echo "FAIL: $name directory does not match frontmatter name '$fm_name'"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "opencode-compatibility (codex-cli path): FAILED"
            exit 1
          fi
          echo "OK: codex-cli install satisfies OpenCode's documented convention"

  # specs/018-warp-support: Warp's separate Skills system (distinct from
  # its AGENTS.md/WARP.md Rules file) scans ten directory names including
  # .claude/skills/ and .agents/skills/ directly -- verified against
  # Warp's own docs, correcting an initial research pass that checked
  # only its Rules docs. Same shape as opencode-compatibility: reuse the
  # existing install paths, assert against this harness's own rules.
  warp-compatibility:
    name: warp-compatibility (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Verify claude-code install satisfies Warp's Skills convention
        shell: bash
        run: |
          ./scripts/install.sh /tmp/warp-check-claude --harness claude-code
          fail=0
          for dir in /tmp/warp-check-claude/.claude/skills/specjedi-*/; do
            name="$(basename "$dir")"
            if ! grep -qE '^name:[[:space:]]*\S+' "${dir}SKILL.md"; then
              echo "FAIL: $name missing 'name:' frontmatter"
              fail=1
            fi
            if ! grep -qE '^description:[[:space:]]*\S+' "${dir}SKILL.md"; then
              echo "FAIL: $name missing 'description:' frontmatter"
              fail=1
            fi
            if ! echo "$name" | grep -qE '^[a-z0-9]+(-[a-z0-9]+)*$'; then
              echo "FAIL: $name is not kebab-case per Warp's Skills naming convention"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "warp-compatibility (claude-code path): FAILED"
            exit 1
          fi
          echo "OK: claude-code install satisfies Warp's documented Skills convention"
      - name: Verify codex-cli install satisfies Warp's Skills convention
        shell: bash
        run: |
          ./scripts/install.sh /tmp/warp-check-codex --harness codex-cli
          fail=0
          for dir in /tmp/warp-check-codex/.agents/skills/specjedi-*/; do
            name="$(basename "$dir")"
            if ! grep -qE '^name:[[:space:]]*\S+' "${dir}SKILL.md"; then
              echo "FAIL: $name missing 'name:' frontmatter"
              fail=1
            fi
            if ! grep -qE '^description:[[:space:]]*\S+' "${dir}SKILL.md"; then
              echo "FAIL: $name missing 'description:' frontmatter"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "warp-compatibility (codex-cli path): FAILED"
            exit 1
          fi
          echo "OK: codex-cli install satisfies Warp's documented Skills convention"

  # Constitution Principle X: checks-only auto-merge is a privilege of the
  # repository owner's own PRs. Anyone else's PR needs the owner's explicit
  # APPROVED review before this job (and therefore ci-gate) goes green.
  # Built as a custom CI check rather than relying on GitHub's native
  # ruleset bypass_actors mechanism, which was verified live not to
  # interoperate with `gh pr merge --auto` (bypass only unlocks a manual
  # admin-override merge, not the automatic flow).
  owner-gate:
    name: owner-gate
    runs-on: ubuntu-latest
    if: always()
    permissions:
      pull-requests: read
    steps:
      - name: Require owner authorship or an owner-approved review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          OWNER: jonyfs
        run: |
          if [ "$PR_AUTHOR" = "$OWNER" ]; then
            echo "PR authored by the repository owner ($OWNER) - auto-pass."
            exit 0
          fi
          echo "PR authored by $PR_AUTHOR (not the owner) - checking for an owner-approved review..."
          latest_owner_state=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate \
            --jq "[.[] | select(.user.login == \"$OWNER\")] | last | .state // \"NONE\"")
          echo "Latest review state from $OWNER: $latest_owner_state"
          if [ "$latest_owner_state" = "APPROVED" ]; then
            echo "Owner-approved - pass."
            exit 0
          fi
          echo "Blocked: this PR requires an APPROVED review from $OWNER before it can merge."
          exit 1

  # checklists/project-completeness.md CHK016: specjedi-tokencheck's
  # SKILL.md documents "which X (or where X on Windows)" as its detection
  # mechanism, but that was only dry-run tested on macOS. This job
  # actually exercises the exact commands on all three OSes — both the
  # tool-present case (a binary guaranteed to exist, `git`) and the
  # tool-absent case (a name guaranteed not to exist) — proving the
  # present/absent distinction the skill relies on genuinely holds on
  # each OS, not just documented.
  tokencheck-detection:
    name: tokencheck-detection (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Verify which-based present/absent detection
        shell: bash
        run: |
          if ! which git >/dev/null 2>&1; then
            echo "FAIL: 'which git' did not detect a binary known to be present on this runner"
            exit 1
          fi
          echo "OK: 'which git' correctly detected a present tool"
          if which specjedi-nonexistent-tool-xyz >/dev/null 2>&1; then
            echo "FAIL: 'which' reported a nonexistent tool as present"
            exit 1
          fi
          echo "OK: 'which' correctly reported a nonexistent tool as absent"

  # Native-PowerShell counterpart: specjedi-tokencheck's own text names
  # `where` as the Windows-specific command, so this exercises that
  # exact command (not bash's `which`) on native PowerShell.
  tokencheck-detection-windows-native:
    name: tokencheck-detection (windows-latest, native PowerShell)
    runs-on: windows-latest
    steps:
      - name: Verify where-based present/absent detection (PowerShell)
        shell: pwsh
        run: |
          where.exe git 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "FAIL: 'where git' did not detect a binary known to be present on this runner"
            exit 1
          }
          Write-Host "OK: 'where git' correctly detected a present tool"
          where.exe specjedi-nonexistent-tool-xyz 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "FAIL: 'where' reported a nonexistent tool as present"
            exit 1
          }
          Write-Host "OK: 'where' correctly reported a nonexistent tool as absent"
          # pwsh's GitHub Actions step wrapper treats the script's trailing
          # $LASTEXITCODE (from the last native command) as the step's own
          # exit code, even when the script's own control flow never called
          # exit. The "absent" case above deliberately leaves $LASTEXITCODE
          # nonzero (that's what "correctly reported absent" means) - an
          # explicit exit 0 here is required so that expected result isn't
          # misread as step failure. Caught by this job's own first live
          # CI run (PR #58).
          exit 0

  # specs/024-bootstrap-installer: this project's own first release
  # (v0.1.0) now exists (Principle XI's deliberate maintainer step has
  # happened), so this job exercises the real, live-download path against
  # the actual GitHub API for this repo (no mocking) plus --help. Before
  # v0.1.0 existed, this job only had a "no release found" graceful-exit
  # path to test; that assertion is now inverted below to match reality.
  # Unauthenticated GitHub API calls are rate-limited per-IP; acceptable
  # here since this is PR-triggered only, not a hot loop.
  bootstrap-installer-smoke:
    name: bootstrap-installer-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    # macos-latest's shared runner IP pool routinely exhausts GitHub's
    # 60/hour anonymous API quota from unrelated global traffic; both
    # bootstrap installers opportunistically use GITHUB_TOKEN (5000/hour)
    # when it's set, which end users running these scripts outside CI
    # simply won't have.
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: --help works and a real release installs successfully (bash)
        shell: bash
        run: |
          ./scripts/bootstrap-install.sh --help
          if ! ./scripts/bootstrap-install.sh /tmp/bootstrap-smoke-sh; then
            echo "FAIL: expected bootstrap-install.sh to succeed now that a real release exists"
            exit 1
          fi
          if [ ! -d /tmp/bootstrap-smoke-sh/.claude/skills ]; then
            echo "FAIL: expected .claude/skills to exist after a successful install"
            exit 1
          fi
          echo "OK: bootstrap-install.sh installed a real published release successfully"
      - name: -Help works and a real release installs successfully (PowerShell)
        shell: pwsh
        run: |
          # pwsh is cross-platform (this step also runs on ubuntu-latest/macos-latest
          # matrix legs), so the target dir must be too -- $env:RUNNER_TEMP resolves
          # correctly on all three OSes, unlike a hardcoded C:\ path.
          $smokeDir = Join-Path $env:RUNNER_TEMP "bootstrap-smoke-ps"
          ./scripts/bootstrap-install.ps1 -Help
          ./scripts/bootstrap-install.ps1 -TargetDir $smokeDir
          if ($LASTEXITCODE -ne 0) {
            Write-Host "FAIL: expected bootstrap-install.ps1 to succeed now that a real release exists"
            exit 1
          }
          if (-not (Test-Path (Join-Path $smokeDir ".claude/skills"))) {
            Write-Host "FAIL: expected .claude\skills to exist after a successful install"
            exit 1
          }
          Write-Host "OK: bootstrap-install.ps1 installed a real published release successfully"
          exit 0

  # specs/038-expand-release-package: the release tarball must contain
  # exactly the user-facing content (skills, usage docs, hook utility
  # scripts) and never this project's own internal spec-authoring/skill-
  # authoring history -- verified by building a real package and
  # inspecting its actual contents (Principle IX), never asserted in docs
  # alone. Also asserts package-release.sh and .ps1 stage byte-identical
  # trees (Principle XIII).
  package-content-completeness:
    name: package-content-completeness (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Build a real package and assert its contents (bash)
        shell: bash
        run: |
          out_dir="$(mktemp -d)"
          ./scripts/package-release.sh v0.0.0-ci-check "$out_dir"
          listing="$(tar -tzf "$out_dir/spec-jedi-v0.0.0-ci-check.tar.gz")"

          fail=0
          # Must be present.
          for path in \
            "README.md" \
            "references/quickstart-guide.md" \
            "references/what-is-sdd.md" \
            "references/specjedi-and-sdd.md" \
            "references/session-start-hook-guide.md" \
            "scripts/session-start.sh" \
            "scripts/session-start.ps1" \
            ".claude/hooks/dangerous-command-guard.sh" \
            ".claude/hooks/dangerous-command-guard.ps1" \
            ".claude/hooks/prevent-direct-push.py" \
            ".claude/hooks/secret-scanner.py" \
            ".claude/hooks/secret-file-guard.sh" \
            ".claude/hooks/secret-file-guard.ps1" \
            ".claude/hooks/conventional-commits.py" \
            "RELEASE_VERSION"; do
            if ! printf '%s\n' "$listing" | grep -qF "spec-jedi-v0.0.0-ci-check/$path"; then
              echo "FAIL: expected $path to be present in the release package, but it wasn't"
              fail=1
            fi
          done
          # Must be absent -- this project's own spec-authoring history
          # and internal skill-authoring/governance reference docs never
          # ship to users.
          if printf '%s\n' "$listing" | grep -qE "spec-jedi-v0.0.0-ci-check/specs/"; then
            echo "FAIL: specs/ leaked into the release package"
            fail=1
          fi
          for path in \
            "CONTRIBUTING.md" \
            "references/skill-authoring-standard.md" \
            "references/skill-validation-testing-framework.md" \
            "references/star-wars-lexicon.md" \
            "references/skill-roadmap.md" \
            "references/mermaid-diagram-catalog.md" \
            "references/principle-traceability.md" \
            "references/genuine-contributions-log.md" \
            "references/competitive-comparison.md" \
            "references/honest-assessment.md" \
            "references/security-question-bank.md" \
            "references/harness-capability-notes.md"; do
            if printf '%s\n' "$listing" | grep -qF "spec-jedi-v0.0.0-ci-check/$path"; then
              echo "FAIL: $path leaked into the release package -- it's internal spec-authoring content, not user-facing"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          # specs/042-skill-freshness-validation: RELEASE_VERSION's
          # content must be exactly the version string passed in, with
          # no trailing newline -- install.sh reads it verbatim to write
          # the installed-release marker.
          check_dir="$(mktemp -d)"
          tar -xzf "$out_dir/spec-jedi-v0.0.0-ci-check.tar.gz" -C "$check_dir"
          content="$(cat "$check_dir/spec-jedi-v0.0.0-ci-check/RELEASE_VERSION")"
          if [ "$content" != "v0.0.0-ci-check" ]; then
            echo "FAIL: RELEASE_VERSION content was '$content', expected 'v0.0.0-ci-check'"
            exit 1
          fi
          echo "OK: package-release.sh's output has exactly the expected contents"
          echo "PKG_SH_OUT=$out_dir" >> "$GITHUB_ENV"
      - name: Build a real package and assert its contents (PowerShell)
        shell: pwsh
        run: |
          $outDir = Join-Path $env:RUNNER_TEMP "pkg-check-ps"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          ./scripts/package-release.ps1 v0.0.0-ci-check $outDir
          $archive = Join-Path $outDir "spec-jedi-v0.0.0-ci-check.tar.gz"
          $listing = (tar -tzf $archive) -join "`n"

          $fail = $false
          $mustExist = @(
            "README.md",
            "references/quickstart-guide.md",
            "references/what-is-sdd.md",
            "references/specjedi-and-sdd.md",
            "references/session-start-hook-guide.md",
            "scripts/session-start.sh",
            "scripts/session-start.ps1",
            ".claude/hooks/dangerous-command-guard.sh",
            ".claude/hooks/dangerous-command-guard.ps1",
            ".claude/hooks/prevent-direct-push.py",
            ".claude/hooks/secret-scanner.py",
            ".claude/hooks/secret-file-guard.sh",
            ".claude/hooks/secret-file-guard.ps1",
            ".claude/hooks/conventional-commits.py",
            "RELEASE_VERSION"
          )
          foreach ($path in $mustExist) {
            if ($listing -notmatch [regex]::Escape("spec-jedi-v0.0.0-ci-check/$path")) {
              Write-Host "FAIL: expected $path to be present in the release package, but it wasn't"
              $fail = $true
            }
          }
          if ($listing -match "spec-jedi-v0.0.0-ci-check/specs/") {
            Write-Host "FAIL: specs/ leaked into the release package"
            $fail = $true
          }
          $mustNotExist = @(
            "CONTRIBUTING.md",
            "references/skill-authoring-standard.md",
            "references/skill-validation-testing-framework.md",
            "references/star-wars-lexicon.md",
            "references/skill-roadmap.md",
            "references/mermaid-diagram-catalog.md",
            "references/principle-traceability.md",
            "references/genuine-contributions-log.md",
            "references/competitive-comparison.md",
            "references/honest-assessment.md",
            "references/security-question-bank.md",
            "references/harness-capability-notes.md"
          )
          foreach ($path in $mustNotExist) {
            if ($listing -match [regex]::Escape("spec-jedi-v0.0.0-ci-check/$path")) {
              Write-Host "FAIL: $path leaked into the release package -- it's internal spec-authoring content, not user-facing"
              $fail = $true
            }
          }
          if ($fail) {
            exit 1
          }
          # specs/042-skill-freshness-validation: RELEASE_VERSION's
          # content must be exactly the version string passed in.
          $checkDir = Join-Path $env:RUNNER_TEMP "pkg-check-ps-extract"
          New-Item -ItemType Directory -Force -Path $checkDir | Out-Null
          tar -xzf $archive -C $checkDir
          $content = Get-Content (Join-Path $checkDir "spec-jedi-v0.0.0-ci-check/RELEASE_VERSION") -Raw
          if ($content -ne "v0.0.0-ci-check") {
            Write-Host "FAIL: RELEASE_VERSION content was '$content', expected 'v0.0.0-ci-check'"
            exit 1
          }
          Write-Host "OK: package-release.ps1's output has exactly the expected contents"
          Add-Content -Path $env:GITHUB_ENV -Value "PKG_PS_OUT=$outDir"
      - name: Assert package-release.sh and .ps1 stage identical trees
        shell: bash
        run: |
          # Reuse the two packages the previous two steps already built
          # (via $PKG_SH_OUT/$PKG_PS_OUT, each written by its own native
          # shell to $GITHUB_ENV) rather than rebuilding a third time.
          #
          # On windows-latest, $PKG_PS_OUT is a Windows-style path (e.g.
          # D:\a\_temp\...); on ubuntu-latest/macos-latest it's already
          # POSIX (pwsh's $env:RUNNER_TEMP resolves natively per OS).
          # tar applies the traditional Unix "host:path" remote-archive
          # convention to any argument matching word-then-colon -- so a
          # Windows drive-letter path parses as "connect to a host
          # literally named D" ("tar (child): Cannot connect to D:
          # resolve failed"). --force-local (the usual fix) isn't
          # supported by every tar variant across the three OSes, so
          # only-when-needed, convert to the POSIX-style form Git Bash's
          # own MSYS runtime already recognizes internally
          # (D:\a\_temp -> /d/a/_temp), which has no colon left to be
          # ambiguous about; leave an already-POSIX path untouched.
          if printf '%s' "$PKG_PS_OUT" | grep -qE '^[A-Za-z]:'; then
            ps_out_posix="/$(printf '%s' "$PKG_PS_OUT" | sed -E 's#\\#/#g; s#^([A-Za-z]):#\1#' | tr '[:upper:]' '[:lower:]')"
          else
            ps_out_posix="$PKG_PS_OUT"
          fi
          sh_extracted="$(mktemp -d)"
          ps_extracted="$(mktemp -d)"
          tar -xzf "$PKG_SH_OUT/spec-jedi-v0.0.0-ci-check.tar.gz" -C "$sh_extracted"
          tar -xzf "$ps_out_posix/spec-jedi-v0.0.0-ci-check.tar.gz" -C "$ps_extracted"
          if ! diff -rq "$sh_extracted" "$ps_extracted"; then
            echo "FAIL: package-release.sh and package-release.ps1 staged different trees for the same version (Constitution Principle XIII)"
            exit 1
          fi
          echo "OK: package-release.sh and .ps1 stage identical trees"

  # specs/039-memory-file-skill-mentions: harnesses with a confirmed,
  # separate project-memory-file convention distinct from their skills
  # directory (CLAUDE.md, AGENTS.md, .trae/rules/project_rules.md) get
  # that file created or idempotently updated with the installed skill
  # set -- verified against a real installer run and real file contents,
  # never asserted in docs alone (Principle IX).
  memory-file-injection:
    name: memory-file-injection (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Assert memory-file injection (bash)
        shell: bash
        run: |
          fail=0
          start_marker="<!-- SPEC-JEDI:SKILLS:START -->"
          end_marker="<!-- SPEC-JEDI:SKILLS:END -->"

          # Scenario 1: fresh creation
          dir1="$(mktemp -d)"
          ./scripts/install.sh "$dir1" --harness claude-code >/dev/null
          if [ ! -f "$dir1/CLAUDE.md" ]; then
            echo "FAIL scenario1: CLAUDE.md not created"; fail=1
          fi
          if ! grep -qF "$start_marker" "$dir1/CLAUDE.md" || ! grep -qF "$end_marker" "$dir1/CLAUDE.md"; then
            echo "FAIL scenario1: markers missing"; fail=1
          fi
          for skill_dir in .claude/skills/specjedi-*/; do
            skill_name="$(basename "$skill_dir")"
            if ! grep -qF "$skill_name" "$dir1/CLAUDE.md"; then
              echo "FAIL scenario1: $skill_name missing from CLAUDE.md"; fail=1
            fi
          done
          echo "OK: scenario1 (fresh creation)"

          # Scenario 2: preserve existing content -- byte-exact prefix
          # check via head -c N + diff, not $(...) capture (strips
          # trailing newlines asymmetrically) or `cmp -n` (behaves
          # inconsistently across platforms).
          dir2="$(mktemp -d)"
          printf '# My Project\n\nRun tests with pytest.\n' > "$dir2/CLAUDE.md"
          cp "$dir2/CLAUDE.md" /tmp/pre-backup-s2.md
          orig_size=$(wc -c < /tmp/pre-backup-s2.md | tr -d ' ')
          ./scripts/install.sh "$dir2" --harness claude-code >/dev/null
          head -c "$orig_size" "$dir2/CLAUDE.md" > /tmp/post-prefix-s2.md
          if ! diff -q /tmp/pre-backup-s2.md /tmp/post-prefix-s2.md >/dev/null; then
            echo "FAIL scenario2: pre-existing content not preserved exactly"; fail=1
          fi
          if ! grep -qF "$start_marker" "$dir2/CLAUDE.md"; then
            echo "FAIL scenario2: markers missing"; fail=1
          fi
          echo "OK: scenario2 (preserve existing content)"

          # Scenario 3: idempotent re-run
          hash1="$(sha256sum "$dir1/CLAUDE.md" | awk '{print $1}')"
          ./scripts/install.sh "$dir1" --harness claude-code >/dev/null
          hash2="$(sha256sum "$dir1/CLAUDE.md" | awk '{print $1}')"
          if [ "$hash1" != "$hash2" ]; then
            echo "FAIL scenario3: re-run not idempotent"; fail=1
          fi
          echo "OK: scenario3 (idempotent re-run)"

          # Scenario 4: CRLF preservation + section refresh (byte-exact
          # prefix AND suffix via head -c / tail -c)
          dir4="$(mktemp -d)"
          printf '# My Project\r\n\r\n%s\r\nSTALE OLD CONTENT\r\n%s\r\n\r\nMore stuff.\r\n' "$start_marker" "$end_marker" > "$dir4/CLAUDE.md"
          cp "$dir4/CLAUDE.md" /tmp/pre-backup-s4.md
          prefix_size=$(grep -abo "$start_marker" /tmp/pre-backup-s4.md | head -1 | cut -d: -f1)
          total_size=$(wc -c < /tmp/pre-backup-s4.md | tr -d ' ')
          suffix_start=$(grep -abo "$end_marker" /tmp/pre-backup-s4.md | head -1 | cut -d: -f1)
          suffix_start=$((suffix_start + ${#end_marker}))
          suffix_size=$((total_size - suffix_start))
          head -c "$prefix_size" /tmp/pre-backup-s4.md > /tmp/pre-prefix-s4.md
          tail -c "$suffix_size" /tmp/pre-backup-s4.md > /tmp/pre-suffix-s4.md
          ./scripts/install.sh "$dir4" --harness claude-code >/dev/null
          if grep -qF "STALE OLD CONTENT" "$dir4/CLAUDE.md"; then
            echo "FAIL scenario4: stale section content was not refreshed (silent no-op)"; fail=1
          fi
          head -c "$prefix_size" "$dir4/CLAUDE.md" > /tmp/post-prefix-s4.md
          if ! diff -q /tmp/pre-prefix-s4.md /tmp/post-prefix-s4.md >/dev/null; then
            echo "FAIL scenario4: CRLF prefix content not preserved"; fail=1
          fi
          tail -c "$suffix_size" "$dir4/CLAUDE.md" > /tmp/post-suffix-s4.md
          if ! diff -q /tmp/pre-suffix-s4.md /tmp/post-suffix-s4.md >/dev/null; then
            echo "FAIL scenario4: CRLF suffix content not preserved"; fail=1
          fi
          echo "OK: scenario4 (CRLF preservation + refresh)"

          # Scenario 5: mismatched marker failure
          dir5="$(mktemp -d)"
          printf '# My Project\n\n%s\nsomething\n' "$start_marker" > "$dir5/CLAUDE.md"
          cp "$dir5/CLAUDE.md" /tmp/pre-backup-s5.md
          if ./scripts/install.sh "$dir5" --harness claude-code >/tmp/scenario5-out.txt 2>&1; then
            echo "FAIL scenario5: expected non-zero exit on mismatched markers"; fail=1
          fi
          if ! grep -qF "$dir5/CLAUDE.md" /tmp/scenario5-out.txt; then
            echo "FAIL scenario5: error message doesn't name the file"; fail=1
          fi
          if ! diff -q /tmp/pre-backup-s5.md "$dir5/CLAUDE.md" >/dev/null; then
            echo "FAIL scenario5: file was modified despite marker mismatch"; fail=1
          fi
          echo "OK: scenario5 (marker-mismatch failure)"

          # Scenario 6: codex-cli / AGENTS.md, path genuinely parameterized
          dir6="$(mktemp -d)"
          ./scripts/install.sh "$dir6" --harness codex-cli >/dev/null
          if [ ! -f "$dir6/AGENTS.md" ]; then
            echo "FAIL scenario6: AGENTS.md not created"; fail=1
          fi
          if ! grep -qF "installed at \`.agents/skills/\`" "$dir6/AGENTS.md"; then
            echo "FAIL scenario6: installed-at path not genuinely parameterized"; fail=1
          fi
          echo "OK: scenario6 (codex-cli/AGENTS.md)"

          # Scenario 7: trae / .trae/rules/project_rules.md
          dir7="$(mktemp -d)"
          ./scripts/install.sh "$dir7" --harness trae >/dev/null
          if [ ! -f "$dir7/.trae/rules/project_rules.md" ]; then
            echo "FAIL scenario7: project_rules.md not created"; fail=1
          fi
          echo "OK: scenario7 (trae/.trae/rules/project_rules.md)"

          # Scenario 8: antigravity -- no memory file, no confirmed convention
          dir8="$(mktemp -d)"
          ./scripts/install.sh "$dir8" --harness antigravity >/dev/null
          if [ -f "$dir8/CLAUDE.md" ] || [ -f "$dir8/AGENTS.md" ] || [ -d "$dir8/.trae" ]; then
            echo "FAIL scenario8: unexpected memory file created for antigravity"; fail=1
          fi
          echo "OK: scenario8 (antigravity, no memory file)"

          # Scenario 9: cursor bridge-file generation unaffected
          dir9="$(mktemp -d)"
          ./scripts/install.sh "$dir9" --harness cursor >/dev/null
          skill_count=$(find .claude/skills -maxdepth 1 -name 'specjedi-*' -type d | wc -l | tr -d ' ')
          bridge_count=$(find "$dir9/.cursor/rules" -name '*.md' | wc -l | tr -d ' ')
          if [ "$skill_count" != "$bridge_count" ] || [ -f "$dir9/CLAUDE.md" ]; then
            echo "FAIL scenario9: bridge-file behavior regressed"; fail=1
          fi
          echo "OK: scenario9 (cursor bridge unaffected)"

          rm -f /tmp/pre-backup-s2.md /tmp/post-prefix-s2.md /tmp/pre-backup-s4.md /tmp/pre-prefix-s4.md /tmp/pre-suffix-s4.md /tmp/post-prefix-s4.md /tmp/post-suffix-s4.md /tmp/pre-backup-s5.md /tmp/scenario5-out.txt
          rm -rf "$dir2" "$dir4" "$dir5" "$dir6" "$dir7" "$dir8" "$dir9"

          if [ "$fail" -ne 0 ]; then
            echo "FAIL: one or more memory-file-injection scenarios failed (bash)"
            exit 1
          fi
          echo "OK: all bash memory-file-injection scenarios passed"
          # $dir1's CLAUDE.md (scenario 1's install, already re-validated
          # idempotent by scenario 3) is kept for the cross-script parity
          # step below, handed off via $GITHUB_ENV rather than passed as
          # a pwsh command-line argument -- passing a bash-generated
          # POSIX-style path into a `pwsh -Command "..."` invocation was
          # found (feature 038) to get mangled by Git Bash's MSYS
          # auto-translation on windows-latest.
          echo "MEMORY_SH_DIR=$dir1" >> "$GITHUB_ENV"
      - name: Assert memory-file injection (PowerShell)
        shell: pwsh
        run: |
          $fail = $false
          $startMarker = "<!-- SPEC-JEDI:SKILLS:START -->"
          $endMarker = "<!-- SPEC-JEDI:SKILLS:END -->"

          # Scenario 1: fresh creation
          $dir1 = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP ([System.IO.Path]::GetRandomFileName()))
          ./scripts/install.ps1 -TargetDir $dir1.FullName -Harness claude-code | Out-Null
          $claudeMd1 = Join-Path $dir1.FullName "CLAUDE.md"
          if (-not (Test-Path $claudeMd1)) { Write-Host "FAIL scenario1: CLAUDE.md not created"; $fail = $true }
          $content1 = Get-Content $claudeMd1 -Raw
          if (-not $content1.Contains($startMarker) -or -not $content1.Contains($endMarker)) { Write-Host "FAIL scenario1: markers missing"; $fail = $true }
          Get-ChildItem -Path ".claude/skills" -Directory -Filter "specjedi-*" | ForEach-Object {
              if (-not $content1.Contains($_.Name)) { Write-Host "FAIL scenario1: $($_.Name) missing"; $fail = $true }
          }
          Write-Host "OK: scenario1 (fresh creation)"

          # Scenario 2: preserve existing content
          $dir2 = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP ([System.IO.Path]::GetRandomFileName()))
          $claudeMd2 = Join-Path $dir2.FullName "CLAUDE.md"
          [System.IO.File]::WriteAllText($claudeMd2, "# My Project`n`nRun tests with pytest.`n")
          $preBytes2 = [System.IO.File]::ReadAllBytes($claudeMd2)
          ./scripts/install.ps1 -TargetDir $dir2.FullName -Harness claude-code | Out-Null
          $postBytes2 = [System.IO.File]::ReadAllBytes($claudeMd2)
          $prefixBytes2 = $postBytes2[0..($preBytes2.Length - 1)]
          if (-not [System.Linq.Enumerable]::SequenceEqual([byte[]]$preBytes2, [byte[]]$prefixBytes2)) {
              Write-Host "FAIL scenario2: pre-existing content not preserved exactly"; $fail = $true
          }
          Write-Host "OK: scenario2 (preserve existing content)"

          # Scenario 3: idempotent re-run
          $hash1 = (Get-FileHash $claudeMd1).Hash
          ./scripts/install.ps1 -TargetDir $dir1.FullName -Harness claude-code | Out-Null
          $hash2 = (Get-FileHash $claudeMd1).Hash
          if ($hash1 -ne $hash2) { Write-Host "FAIL scenario3: not idempotent"; $fail = $true }
          Write-Host "OK: scenario3 (idempotent re-run)"

          # Scenario 4: CRLF preservation + refresh
          $dir4 = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP ([System.IO.Path]::GetRandomFileName()))
          $claudeMd4 = Join-Path $dir4.FullName "CLAUDE.md"
          $crlfContent = "# My Project`r`n`r`n$startMarker`r`nSTALE OLD CONTENT`r`n$endMarker`r`n`r`nMore stuff.`r`n"
          [System.IO.File]::WriteAllText($claudeMd4, $crlfContent)
          $preIdx = $crlfContent.IndexOf($startMarker)
          $prePrefix = $crlfContent.Substring(0, $preIdx)
          $sufIdx = $crlfContent.LastIndexOf($endMarker) + $endMarker.Length
          $preSuffix = $crlfContent.Substring($sufIdx)
          ./scripts/install.ps1 -TargetDir $dir4.FullName -Harness claude-code | Out-Null
          $postContent4 = [System.IO.File]::ReadAllText($claudeMd4)
          if ($postContent4.Contains("STALE OLD CONTENT")) { Write-Host "FAIL scenario4: not refreshed"; $fail = $true }
          $postPrefix = $postContent4.Substring(0, $preIdx)
          if ($postPrefix -ne $prePrefix) { Write-Host "FAIL scenario4: prefix not preserved"; $fail = $true }
          $postSuffix = $postContent4.Substring($postContent4.Length - $preSuffix.Length)
          if ($postSuffix -ne $preSuffix) { Write-Host "FAIL scenario4: suffix not preserved"; $fail = $true }
          Write-Host "OK: scenario4 (CRLF preservation + refresh)"

          # Scenario 5: mismatched marker failure
          $dir5 = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP ([System.IO.Path]::GetRandomFileName()))
          $claudeMd5 = Join-Path $dir5.FullName "CLAUDE.md"
          $origContent5 = "# My Project`n`n$startMarker`nsomething`n"
          [System.IO.File]::WriteAllText($claudeMd5, $origContent5)
          $errFile = Join-Path $env:RUNNER_TEMP "scenario5-ps-out.txt"
          & ./scripts/install.ps1 -TargetDir $dir5.FullName -Harness claude-code *> $errFile
          if ($LASTEXITCODE -eq 0) { Write-Host "FAIL scenario5: expected non-zero exit"; $fail = $true }
          $errOut = Get-Content $errFile -Raw
          if (-not $errOut.Contains($claudeMd5)) { Write-Host "FAIL scenario5: error doesn't name file"; $fail = $true }
          $postContent5 = [System.IO.File]::ReadAllText($claudeMd5)
          if ($postContent5 -ne $origContent5) { Write-Host "FAIL scenario5: file modified despite mismatch"; $fail = $true }
          Write-Host "OK: scenario5 (marker-mismatch failure)"

          if ($fail) {
              Write-Host "FAIL: one or more memory-file-injection scenarios failed (PowerShell)"
              exit 1
          }
          Write-Host "OK: all PowerShell memory-file-injection scenarios passed"

          Remove-Item -Recurse -Force $dir2, $dir4, $dir5 -ErrorAction SilentlyContinue
          Remove-Item -Force $errFile -ErrorAction SilentlyContinue
          # $dir1's CLAUDE.md (scenario 1's install, re-validated
          # idempotent by scenario 3) is kept for the cross-script parity
          # step below.
          Add-Content -Path $env:GITHUB_ENV -Value "MEMORY_PS_DIR=$($dir1.FullName)"
          # Scenario 5 intentionally invokes install.ps1 expecting a
          # non-zero exit, which leaves $LASTEXITCODE=1 with nothing
          # after it to reset that value -- GitHub Actions' pwsh step
          # runner treats a stale non-zero $LASTEXITCODE at script end as
          # step failure even though every $fail check above passed.
          # Explicit exit 0 overrides it.
          exit 0
      - name: Assert install.sh and install.ps1 produce identical CLAUDE.md output
        shell: bash
        run: |
          # Reuse the two directories the preceding two steps already
          # built (via $MEMORY_SH_DIR/$MEMORY_PS_DIR, each written by its
          # own native shell to $GITHUB_ENV) rather than a third/fourth
          # install run. $MEMORY_PS_DIR may be a Windows-style path (e.g.
          # D:\a\_temp\...) on windows-latest; diff (unlike tar) has no
          # "host:path" remote-archive convention to misinterpret a
          # colon in the argument, so no path conversion is needed here
          # -- confirmed against feature 038's own equivalent parity
          # check, which needed conversion specifically because `tar`
          # does have that convention.
          if ! diff -q "$MEMORY_SH_DIR/CLAUDE.md" "$MEMORY_PS_DIR/CLAUDE.md" >/dev/null; then
            echo "FAIL: install.sh and install.ps1 produced different CLAUDE.md output for the same input (Constitution Principle XIII)"
            diff "$MEMORY_SH_DIR/CLAUDE.md" "$MEMORY_PS_DIR/CLAUDE.md" || true
            exit 1
          fi
          echo "OK: install.sh and install.ps1 produce byte-identical CLAUDE.md output"
          rm -rf "$MEMORY_SH_DIR" "$MEMORY_PS_DIR"

  # specs/041-release-hooks-settings (User Story 1): proves the
  # shareable dangerous-command-guard/statusline/permissions actually
  # land in a claude-code install, are trunk-branch-aware, idempotent,
  # and never leak the two repo-internal-only hooks -- real
  # scratch-directory installs with real file-content assertions
  # (Principle IX), matching install-test's own established pattern.
  install-test-shared-hooks:
    name: install-test-shared-hooks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Fresh claude-code install has shareable hooks/settings, never repo-internal ones
        shell: bash
        run: |
          dir1=$(mktemp -d)
          ./scripts/install.sh "$dir1" --harness claude-code >/dev/null
          test -f "$dir1/.claude/hooks/dangerous-command-guard.sh" || { echo "FAIL: dangerous-command-guard.sh missing"; exit 1; }
          test -f "$dir1/.claude/hooks/prevent-direct-push.py" || { echo "FAIL: prevent-direct-push.py missing (specs/058 US1)"; exit 1; }
          test -f "$dir1/.claude/hooks/secret-scanner.py" || { echo "FAIL: secret-scanner.py missing (specs/058 US2)"; exit 1; }
          test -f "$dir1/.claude/hooks/secret-file-guard.sh" || { echo "FAIL: secret-file-guard.sh missing (specs/058 US5)"; exit 1; }
          grep -q '"statusLine"' "$dir1/.claude/settings.json" || { echo "FAIL: statusLine missing"; exit 1; }
          grep -q '"permissions"' "$dir1/.claude/settings.json" || { echo "FAIL: permissions missing"; exit 1; }
          python3 -m json.tool "$dir1/.claude/settings.json" >/dev/null || { echo "FAIL: settings.json not valid JSON"; exit 1; }
          grep -qF 'python3 \"${CLAUDE_PROJECT_DIR}/.claude/hooks/prevent-direct-push.py\"' "$dir1/.claude/settings.json" || { echo "FAIL: prevent-direct-push.py not wired into PreToolUse/Bash"; exit 1; }
          grep -qF 'python3 \"${CLAUDE_PROJECT_DIR}/.claude/hooks/secret-scanner.py\"' "$dir1/.claude/settings.json" || { echo "FAIL: secret-scanner.py not wired into PreToolUse/Bash"; exit 1; }
          grep -q '"matcher": "Read|Grep|Glob"' "$dir1/.claude/settings.json" || { echo "FAIL: Read|Grep|Glob matcher missing"; exit 1; }
          grep -qF '"${CLAUDE_PROJECT_DIR}/.claude/hooks/secret-file-guard.sh"' "$dir1/.claude/settings.json" || { echo "FAIL: secret-file-guard.sh not wired into PreToolUse/Read|Grep|Glob"; exit 1; }
          if [ -f "$dir1/.claude/hooks/skill-quality-guard.sh" ] || [ -f "$dir1/.claude/hooks/cross-platform-parity-guard.sh" ]; then
            echo "FAIL: repo-internal-only hook leaked into target"
            exit 1
          fi
          echo "OK: shareable hooks/settings present, repo-internal hooks absent"
      - name: Idempotent re-run produces byte-identical settings.json
        shell: bash
        run: |
          dir2=$(mktemp -d)
          ./scripts/install.sh "$dir2" --harness claude-code >/dev/null
          cp "$dir2/.claude/settings.json" /tmp/before.json
          ./scripts/install.sh "$dir2" --harness claude-code >/dev/null
          diff /tmp/before.json "$dir2/.claude/settings.json" || { echo "FAIL: settings.json changed on re-run"; exit 1; }
          echo "OK: idempotent re-run"
      - name: Trunk-branch detection protects the target's real default branch
        shell: bash
        run: |
          dir3=$(mktemp -d)
          remote=$(mktemp -d)/remote.git
          mkdir -p "$remote"
          (cd "$remote" && git init -q --bare && git symbolic-ref HEAD refs/heads/develop)
          (cd "$dir3" && git init -q && git config user.email "t@example.com" && git config user.name "T" && git checkout -q -b develop && git commit -q --allow-empty -m init && git remote add origin "$remote" && git push -q -u origin develop)
          ./scripts/install.sh "$dir3" --harness claude-code >/dev/null
          grep -q "develop|develop:develop) has_main_or_master=1" "$dir3/.claude/hooks/dangerous-command-guard.sh" || { echo "FAIL: trunk branch not detected/baked in"; exit 1; }
          grep -qF 'PROTECTED = {"develop"}' "$dir3/.claude/hooks/prevent-direct-push.py" || { echo "FAIL: prevent-direct-push.py PROTECTED set not trunk-substituted (specs/058 US1)"; exit 1; }
          echo "OK: develop detected and baked into the installed hook"
      - name: No-origin-remote target falls back to main/master
        shell: bash
        run: |
          dir4=$(mktemp -d)
          ./scripts/install.sh "$dir4" --harness claude-code >/dev/null
          grep -qE "has_main_or_master=1" "$dir4/.claude/hooks/dangerous-command-guard.sh" || { echo "FAIL: no fallback trunk check found"; exit 1; }
          echo "OK: fallback trunk check present for a target with no origin remote"
      - name: secret-file-guard.sh actively denies secret-file reads, at any depth (US5)
        shell: bash
        run: |
          dir_guard=$(mktemp -d)
          ./scripts/install.sh "$dir_guard" --harness claude-code >/dev/null
          guard="$dir_guard/.claude/hooks/secret-file-guard.sh"
          out1=$(python3 -c "import json,sys; print(json.dumps({'tool_name':'Read','tool_input':{'file_path':'/tmp/x/.env'}}))" | "$guard")
          [ -n "$out1" ] || { echo "FAIL: root .env not denied"; exit 1; }
          out2=$(python3 -c "import json,sys; print(json.dumps({'tool_name':'Read','tool_input':{'file_path':'/tmp/x/packages/api/.env'}}))" | "$guard")
          [ -n "$out2" ] || { echo "FAIL: nested .env not denied (SC-005)"; exit 1; }
          out3=$(python3 -c "import json,sys; print(json.dumps({'tool_name':'Read','tool_input':{'file_path':'/tmp/x/.env.example'}}))" | "$guard")
          [ -z "$out3" ] || { echo "FAIL: .env.example wrongly denied (SC-006)"; exit 1; }
          out4=$(python3 -c "import json,sys; print(json.dumps({'tool_name':'Grep','tool_input':{'path':'/tmp/x'}}))" | "$guard")
          [ -z "$out4" ] || { echo "FAIL: directory-scoped Grep wrongly denied"; exit 1; }
          echo "OK: secret-file-guard.sh denies at any depth, allows templates and directory searches"
      - name: conventional-commits.py is opt-in only, via its own separate prompt (US3, FR-003)
        shell: bash
        run: |
          # SPECJEDI_TEST_FORCE_HOOKS_PROMPT is an explicit test seam
          # (scripts/install.sh's own comment explains why): the real
          # interactive-mode gate requires an actual TTY, never true in
          # CI, and forcing the *global* interactive flag would also
          # re-trigger the earlier directory/harness wizard prompts this
          # job's other steps don't expect.
          dir_optin=$(mktemp -d)
          printf '\ny\n\n' | SPECJEDI_TEST_FORCE_HOOKS_PROMPT=1 bash scripts/install.sh "$dir_optin" --harness claude-code >/dev/null
          test -f "$dir_optin/.claude/hooks/conventional-commits.py" || { echo "FAIL: conventional-commits.py missing after explicit opt-in"; exit 1; }
          grep -q "conventional-commits.py" "$dir_optin/.claude/settings.json" || { echo "FAIL: conventional-commits.py not wired after opt-in"; exit 1; }

          dir_declined=$(mktemp -d)
          printf '\n\n\n' | SPECJEDI_TEST_FORCE_HOOKS_PROMPT=1 bash scripts/install.sh "$dir_declined" --harness claude-code >/dev/null
          if [ -f "$dir_declined/.claude/hooks/conventional-commits.py" ]; then
            echo "FAIL: conventional-commits.py installed despite the default-declined answer"
            exit 1
          fi

          dir_noninteractive=$(mktemp -d)
          bash scripts/install.sh "$dir_noninteractive" --harness claude-code >/dev/null
          if [ -f "$dir_noninteractive/.claude/hooks/conventional-commits.py" ]; then
            echo "FAIL: conventional-commits.py installed on a non-interactive run"
            exit 1
          fi
          echo "OK: conventional-commits.py opt-in prompt behaves correctly (accept/decline/non-interactive)"
      - name: python3 absence skips Python-based hooks, never the bash ones (FR-005)
        shell: bash
        run: |
          dir_nopy=$(mktemp -d)
          # Simulates python3 absence via has_python3()'s own explicit
          # test seam (SPECJEDI_TEST_FORCE_NO_PYTHON3), never by mutating
          # the real environment. Three separate mutation techniques each
          # failed for a different real, platform-specific reason on this
          # feature's own CI (found via actual job logs, not assumed):
          # symlinking real binaries into a shadow PATH broke Windows/Git
          # Bash's MSYS2 DLL resolution; filtering python3's own PATH
          # directory out entirely also removed unrelated coreutils
          # sharing that directory (e.g. macOS's /usr/bin); renaming the
          # real system python3 aside needs root on a stock Ubuntu/macOS
          # runner. A dependency-injection env var sidesteps all three.
          SPECJEDI_TEST_FORCE_NO_PYTHON3=1 bash scripts/install.sh "$dir_nopy" --harness claude-code >/tmp/nopython-out.txt 2>&1 || true
          cat /tmp/nopython-out.txt
          if [ -f "$dir_nopy/.claude/hooks/prevent-direct-push.py" ] || [ -f "$dir_nopy/.claude/hooks/secret-scanner.py" ]; then
            echo "FAIL: a Python-based hook installed despite python3 absence"
            exit 1
          fi
          grep -q "python3 not found.*prevent-direct-push.py.*secret-scanner.py" /tmp/nopython-out.txt || { echo "FAIL: no single combined named skip-warning for both hooks (FR-005)"; exit 1; }
          test -f "$dir_nopy/.claude/hooks/dangerous-command-guard.sh" || { echo "FAIL: bash hook wrongly skipped too"; exit 1; }
          test -f "$dir_nopy/.claude/hooks/secret-file-guard.sh" || { echo "FAIL: secret-file-guard.sh (also bash, zero-dependency) wrongly skipped too"; exit 1; }
          echo "OK: python3-gated hooks skip cleanly with a named warning; bash hooks unaffected"
      - name: python3-absent combined-warning names all three hooks together, exactly once (US1+US2+US3, T058)
        shell: bash
        run: |
          dir_nopy_cc=$(mktemp -d)
          printf '\ny\n\n' | SPECJEDI_TEST_FORCE_NO_PYTHON3=1 SPECJEDI_TEST_FORCE_HOOKS_PROMPT=1 bash scripts/install.sh "$dir_nopy_cc" --harness claude-code >/tmp/nopython-cc-out.txt 2>&1 || true
          cat /tmp/nopython-cc-out.txt
          if [ -f "$dir_nopy_cc/.claude/hooks/conventional-commits.py" ]; then
            echo "FAIL: conventional-commits.py installed despite python3 absence, even though opted in"
            exit 1
          fi
          warning_count=$(grep -c "python3 not found — skipping" /tmp/nopython-cc-out.txt)
          [ "$warning_count" -eq 1 ] || { echo "FAIL: expected exactly one combined skip-warning line, found $warning_count"; exit 1; }
          grep -q "python3 not found.*prevent-direct-push.py.*secret-scanner.py.*conventional-commits.py" /tmp/nopython-cc-out.txt || { echo "FAIL: the single skip-warning doesn't name all three hooks together (prevent-direct-push.py, secret-scanner.py, conventional-commits.py)"; exit 1; }
          echo "OK: exactly one combined skip-warning names all three Python-based hooks together"
      - name: Pre-existing settings.json content survives the merge
        shell: bash
        run: |
          dir5=$(mktemp -d)
          mkdir -p "$dir5/.claude"
          cat > "$dir5/.claude/settings.json" <<'EOF'
          {
            "hooks": {
              "SessionStart": [{"hooks": [{"type": "command", "command": "echo hi"}]}]
            }
          }
          EOF
          ./scripts/install.sh "$dir5" --harness claude-code >/dev/null
          grep -q '"SessionStart"' "$dir5/.claude/settings.json" || { echo "FAIL: pre-existing content was destroyed"; exit 1; }
          python3 -m json.tool "$dir5/.claude/settings.json" >/dev/null || { echo "FAIL: settings.json not valid JSON after merge"; exit 1; }
          echo "OK: pre-existing settings.json content preserved"
      - name: add-manually message names every new hook, not just dangerous-command-guard.sh (FR-006, T056)
        shell: bash
        run: |
          dir6=$(mktemp -d)
          mkdir -p "$dir6/.claude"
          cat > "$dir6/.claude/settings.json" <<'EOF'
          {
            "hooks": {
              "PreToolUse": [{"matcher": "Bash", "hooks": [{"type": "command", "command": "echo my-own-hook"}]}]
            }
          }
          EOF
          printf '\ny\n\n' | SPECJEDI_TEST_FORCE_HOOKS_PROMPT=1 ./scripts/install.sh "$dir6" --harness claude-code > /tmp/addmanually-out.txt 2>&1
          msg="$(grep 'already has a PreToolUse hooks array' /tmp/addmanually-out.txt)"
          [ -n "$msg" ] || { echo "FAIL: add-manually message missing"; exit 1; }
          for h in dangerous-command-guard.sh prevent-direct-push.py secret-scanner.py secret-file-guard.sh conventional-commits.py; do
            echo "$msg" | grep -q "$h" || { echo "FAIL: add-manually message doesn't name $h: $msg"; exit 1; }
          done
          echo "OK: add-manually message names every new hook, not just dangerous-command-guard.sh"

  # Native PowerShell counterpart of install-test-shared-hooks, same
  # reasoning as install-test-windows-native.
  install-test-shared-hooks-windows-native:
    name: install-test-shared-hooks (windows-latest, native PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fresh claude-code install has shareable hooks/settings, never repo-internal ones
        shell: pwsh
        run: |
          $dir1 = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          ./scripts/install.ps1 -TargetDir $dir1 -Harness claude-code | Out-Null
          if (-not (Test-Path (Join-Path $dir1 ".claude/hooks/dangerous-command-guard.ps1"))) { Write-Host "FAIL: dangerous-command-guard.ps1 missing"; exit 1 }
          if (-not (Test-Path (Join-Path $dir1 ".claude/hooks/prevent-direct-push.py"))) { Write-Host "FAIL: prevent-direct-push.py missing (specs/058 US1)"; exit 1 }
          if (-not (Test-Path (Join-Path $dir1 ".claude/hooks/secret-scanner.py"))) { Write-Host "FAIL: secret-scanner.py missing (specs/058 US2)"; exit 1 }
          if (-not (Test-Path (Join-Path $dir1 ".claude/hooks/secret-file-guard.ps1"))) { Write-Host "FAIL: secret-file-guard.ps1 missing (specs/058 US5)"; exit 1 }
          $settings = Get-Content (Join-Path $dir1 ".claude/settings.json") -Raw
          if ($settings -notmatch '"statusLine"') { Write-Host "FAIL: statusLine missing"; exit 1 }
          if ($settings -notmatch '"permissions"') { Write-Host "FAIL: permissions missing"; exit 1 }
          if (-not $settings.Contains('python3 \"${CLAUDE_PROJECT_DIR}/.claude/hooks/prevent-direct-push.py\"')) { Write-Host "FAIL: prevent-direct-push.py not wired into PreToolUse/Bash"; exit 1 }
          if (-not $settings.Contains('python3 \"${CLAUDE_PROJECT_DIR}/.claude/hooks/secret-scanner.py\"')) { Write-Host "FAIL: secret-scanner.py not wired into PreToolUse/Bash"; exit 1 }
          if ($settings -notmatch '"matcher": "Read\|Grep\|Glob"') { Write-Host "FAIL: Read|Grep|Glob matcher missing"; exit 1 }
          if (-not $settings.Contains('secret-file-guard.ps1')) { Write-Host "FAIL: secret-file-guard.ps1 not wired into PreToolUse/Read|Grep|Glob"; exit 1 }
          $null = $settings | ConvertFrom-Json
          if ((Test-Path (Join-Path $dir1 ".claude/hooks/skill-quality-guard.ps1")) -or (Test-Path (Join-Path $dir1 ".claude/hooks/cross-platform-parity-guard.ps1"))) {
            Write-Host "FAIL: repo-internal-only hook leaked into target"
            exit 1
          }
          Write-Host "OK: shareable hooks/settings present, repo-internal hooks absent"
      - name: Idempotent re-run produces byte-identical settings.json
        shell: pwsh
        run: |
          $dir2 = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          ./scripts/install.ps1 -TargetDir $dir2 -Harness claude-code | Out-Null
          $before = Get-Content (Join-Path $dir2 ".claude/settings.json") -Raw
          ./scripts/install.ps1 -TargetDir $dir2 -Harness claude-code | Out-Null
          $after = Get-Content (Join-Path $dir2 ".claude/settings.json") -Raw
          if ($before -ne $after) { Write-Host "FAIL: settings.json changed on re-run"; exit 1 }
          Write-Host "OK: idempotent re-run"
      - name: Pre-existing settings.json content survives the merge
        shell: pwsh
        run: |
          $dir5 = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          New-Item -ItemType Directory -Force -Path (Join-Path $dir5 ".claude") | Out-Null
          '{
            "hooks": {
              "SessionStart": [{"hooks": [{"type": "command", "command": "echo hi"}]}]
            }
          }' | Set-Content (Join-Path $dir5 ".claude/settings.json")
          ./scripts/install.ps1 -TargetDir $dir5 -Harness claude-code | Out-Null
          $settings = Get-Content (Join-Path $dir5 ".claude/settings.json") -Raw
          if ($settings -notmatch '"SessionStart"') { Write-Host "FAIL: pre-existing content was destroyed"; exit 1 }
          $null = $settings | ConvertFrom-Json
          Write-Host "OK: pre-existing settings.json content preserved"
      - name: add-manually message names every new hook, not just dangerous-command-guard.ps1 (FR-006, T056)
        shell: pwsh
        run: |
          $env:SPECJEDI_TEST_FORCE_HOOKS_PROMPT = "1"
          $dir6 = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          New-Item -ItemType Directory -Force -Path (Join-Path $dir6 ".claude") | Out-Null
          '{
            "hooks": {
              "PreToolUse": [{"matcher": "Bash", "hooks": [{"type": "command", "command": "echo my-own-hook"}]}]
            }
          }' | Set-Content (Join-Path $dir6 ".claude/settings.json")
          $out = "`ny`n`n" | & pwsh -NoProfile -File ./scripts/install.ps1 -TargetDir $dir6 -Harness claude-code 2>&1
          $joined = $out -join "`n"
          $msgLine = ($joined -split "`n" | Where-Object { $_ -match "already has a PreToolUse hooks array" })
          if (-not $msgLine) { Write-Host "FAIL: add-manually message missing"; exit 1 }
          foreach ($h in @("dangerous-command-guard.ps1", "prevent-direct-push.py", "secret-scanner.py", "secret-file-guard.ps1", "conventional-commits.py")) {
              if ($msgLine -notmatch [regex]::Escape($h)) { Write-Host "FAIL: add-manually message doesn't name $h`: $msgLine"; exit 1 }
          }
          Write-Host "OK: add-manually message names every new hook, not just dangerous-command-guard.ps1"

  # specs/042-skill-freshness-validation (User Story 1): proves
  # install.sh writes the installed-release marker correctly in both
  # states it can produce -- the "local-checkout" sentinel when run from
  # a plain git clone, and a real version string when run from a tarball
  # package-release.sh actually staged (whether or not bootstrap-
  # install.sh was involved -- it's unmodified, see research.md Decision
  # 2) -- real scratch-directory installs with real file-content
  # assertions (Principle IX), matching install-test-shared-hooks's
  # established pattern.
  install-test-release-marker:
    name: install-test-release-marker (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Local checkout install writes the local-checkout sentinel
        shell: bash
        run: |
          dir1=$(mktemp -d)
          ./scripts/install.sh "$dir1" --harness claude-code >/dev/null
          marker="$dir1/.specify/release-marker.json"
          test -f "$marker" || { echo "FAIL: release-marker.json missing"; exit 1; }
          grep -q '"installed_release": "local-checkout"' "$marker" || { echo "FAIL: expected local-checkout sentinel, got: $(cat "$marker")"; exit 1; }
          echo "OK: local checkout install writes the local-checkout sentinel"
      - name: Install from an extracted release tarball writes the real version
        shell: bash
        run: |
          out_dir=$(mktemp -d)
          ./scripts/package-release.sh v0.0.0-marker-check "$out_dir" >/dev/null
          work_dir=$(mktemp -d)
          tar -xzf "$out_dir/spec-jedi-v0.0.0-marker-check.tar.gz" -C "$work_dir"
          target=$(mktemp -d)
          "$work_dir/spec-jedi-v0.0.0-marker-check/scripts/install.sh" "$target" --harness claude-code >/dev/null
          marker="$target/.specify/release-marker.json"
          test -f "$marker" || { echo "FAIL: release-marker.json missing"; exit 1; }
          grep -q '"installed_release": "v0.0.0-marker-check"' "$marker" || { echo "FAIL: expected real version tag, got: $(cat "$marker")"; exit 1; }
          echo "OK: install from an extracted release tarball writes the real version"

  # Native PowerShell counterpart of install-test-release-marker, same
  # reasoning as install-test-shared-hooks-windows-native.
  install-test-release-marker-windows-native:
    name: install-test-release-marker (windows-latest, native PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Local checkout install writes the local-checkout sentinel
        shell: pwsh
        run: |
          $dir1 = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          ./scripts/install.ps1 -TargetDir $dir1 -Harness claude-code | Out-Null
          $marker = Join-Path $dir1 ".specify/release-marker.json"
          if (-not (Test-Path $marker)) { Write-Host "FAIL: release-marker.json missing"; exit 1 }
          $content = Get-Content $marker -Raw
          if ($content -notmatch '"installed_release": "local-checkout"') { Write-Host "FAIL: expected local-checkout sentinel, got: $content"; exit 1 }
          Write-Host "OK: local checkout install writes the local-checkout sentinel"
      - name: Install from an extracted release tarball writes the real version
        shell: pwsh
        run: |
          $outDir = Join-Path $env:RUNNER_TEMP "marker-check-pkg"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          ./scripts/package-release.ps1 v0.0.0-marker-check-ps $outDir | Out-Null
          $workDir = Join-Path $env:RUNNER_TEMP "marker-check-extract"
          New-Item -ItemType Directory -Force -Path $workDir | Out-Null
          tar -xzf (Join-Path $outDir "spec-jedi-v0.0.0-marker-check-ps.tar.gz") -C $workDir
          $target = Join-Path $env:RUNNER_TEMP "marker-check-target"
          & (Join-Path $workDir "spec-jedi-v0.0.0-marker-check-ps/scripts/install.ps1") -TargetDir $target -Harness claude-code | Out-Null
          $marker = Join-Path $target ".specify/release-marker.json"
          if (-not (Test-Path $marker)) { Write-Host "FAIL: release-marker.json missing"; exit 1 }
          $content = Get-Content $marker -Raw
          if ($content -notmatch '"installed_release": "v0.0.0-marker-check-ps"') { Write-Host "FAIL: expected real version tag, got: $content"; exit 1 }
          Write-Host "OK: install from an extracted release tarball writes the real version"

  # specs/042-skill-freshness-validation (User Story 2): proves
  # session-start.sh/.ps1's freshness check surfaces an update line when
  # genuinely behind, stays silent when current, and degrades silently
  # (never errors, never stalls) on every incomplete state -- real
  # invocations against a scratch project with a seeded marker, never
  # asserted in docs alone (Principle IX).
  session-start-freshness-check:
    name: session-start-freshness-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    # Same reasoning as bootstrap-installer-smoke: shared runner IP pools
    # (macos-latest especially) routinely exhaust GitHub's 60/hour
    # anonymous API quota from unrelated global traffic. The "stale
    # marker" scenario below needs a real releases/latest lookup to
    # succeed to prove anything -- GITHUB_TOKEN raises the effective
    # limit to 5000/hour for this job's own runs, same as the two
    # installer scripts already do internally when the variable happens
    # to be set.
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Silent states -- no marker, malformed marker, local-checkout sentinel
        shell: bash
        run: |
          proj=$(mktemp -d)
          mkdir -p "$proj/scripts" "$proj/.specify"
          cp scripts/session-start.sh "$proj/scripts/session-start.sh"

          out="$(bash "$proj/scripts/session-start.sh")"
          if printf '%s' "$out" | grep -q "Update available:"; then
            echo "FAIL: no-marker state produced a freshness line"; exit 1
          fi

          echo 'not json' > "$proj/.specify/release-marker.json"
          out="$(bash "$proj/scripts/session-start.sh")"
          if printf '%s' "$out" | grep -q "Update available:"; then
            echo "FAIL: malformed-marker state produced a freshness line"; exit 1
          fi

          echo '{"installed_release": "local-checkout"}' > "$proj/.specify/release-marker.json"
          out="$(bash "$proj/scripts/session-start.sh")"
          if printf '%s' "$out" | grep -q "Update available:"; then
            echo "FAIL: local-checkout sentinel produced a freshness line"; exit 1
          fi
          echo "OK: all three silent states produced no freshness line"
      - name: Stale marker surfaces the update line naming the real latest tag
        shell: bash
        run: |
          # specs/058-expand-shareable-hooks (FR-010 follow-up, real CI
          # failure observed 2026-07-20): session-start.sh's own live
          # api.github.com call uses a deliberately tight 2s --max-time
          # (comment at that call site) so every session start stays
          # fast -- correct, intentional behavior that degrades silently
          # on a slow/unavailable API rather than erroring. That means
          # THIS test, which depends on that live call actually
          # succeeding within 2s to prove anything, is inherently exposed
          # to real, transient GitHub API latency spikes no code change
          # in session-start.sh itself should paper over. Retried up to
          # 3 times with a short backoff -- same reasoning as
          # bootstrap-install.sh's own 3-attempt retry loop (specs/042
          # research.md Decision 3) cited in session-start.sh's own
          # comment -- since a single transient miss here is a CI
          # environment flake, not a regression in the script under test.
          proj=$(mktemp -d)
          mkdir -p "$proj/scripts" "$proj/.specify"
          cp scripts/session-start.sh "$proj/scripts/session-start.sh"
          echo '{"installed_release": "v0.0.0-definitely-stale"}' > "$proj/.specify/release-marker.json"

          attempt=1
          max_attempts=3
          while :; do
            out="$(bash "$proj/scripts/session-start.sh")"
            if printf '%s' "$out" | grep -qF "v0.0.0-definitely-stale installed" \
              && printf '%s' "$out" | grep -qF "scripts/bootstrap-install.sh/.ps1" \
              && printf '%s' "$out" | grep -qF "ask whether to update"; then
              echo "OK: stale marker produces a correctly-worded update line (attempt $attempt/$max_attempts)"
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "FAIL: expected the stale-tag update line after $max_attempts attempts, got:"; printf '%s\n' "$out"; exit 1
            fi
            echo "Attempt $attempt/$max_attempts didn't get the expected update line (likely a transient api.github.com latency spike, matching session-start.sh's own deliberately tight 2s timeout) -- retrying in 5s..."
            attempt=$((attempt + 1))
            sleep 5
          done
      - name: Current marker stays silent, blocked network degrades silently and fast
        shell: bash
        run: |
          proj=$(mktemp -d)
          mkdir -p "$proj/scripts" "$proj/.specify"
          cp scripts/session-start.sh "$proj/scripts/session-start.sh"

          latest="$(curl -sSL --max-time 5 https://api.github.com/repos/jonyfs/spec-jedi/releases/latest 2>/dev/null | grep -m1 '"tag_name"' | sed -E 's/.*"tag_name": *"([^"]+)".*/\1/')" || true
          if [ -n "$latest" ]; then
            printf '{"installed_release": "%s"}\n' "$latest" > "$proj/.specify/release-marker.json"
            # `out=$(cmd)` under this job's own `set -e` would abort this
            # step immediately if session-start.sh ever exited nonzero,
            # skipping every check below it -- guard with `|| exit_code=$?`
            # so a real regression is reported with full context instead
            # of silently killing the step.
            exit_code=0
            out="$(bash "$proj/scripts/session-start.sh" 2>&1)" || exit_code=$?
            if [ "$exit_code" -ne 0 ]; then
              echo "FAIL: session-start.sh exited $exit_code on a current marker. Output:"; printf '%s\n' "$out"; exit 1
            fi
            if printf '%s' "$out" | grep -q "Update available:"; then
              echo "FAIL: current marker produced a freshness line"; exit 1
            fi
            echo "OK: current marker stays silent"
          else
            echo "SKIP: could not resolve latest release tag from this runner -- skipping current-marker check"
          fi

          echo '{"installed_release": "v0.0.0-network-blocked"}' > "$proj/.specify/release-marker.json"
          start=$(date +%s)
          exit_code=0
          out="$(env http_proxy="http://127.0.0.1:1" https_proxy="http://127.0.0.1:1" bash "$proj/scripts/session-start.sh" 2>&1)" || exit_code=$?
          elapsed=$(( $(date +%s) - start ))
          if [ "$exit_code" -ne 0 ]; then
            echo "FAIL: session-start.sh exited $exit_code with a blocked network. Output:"; printf '%s\n' "$out"; exit 1
          fi
          if printf '%s' "$out" | grep -q "Update available:"; then
            echo "FAIL: blocked-network state produced a freshness line"; exit 1
          fi
          if [ "$elapsed" -gt 10 ]; then
            echo "FAIL: session-start.sh took ${elapsed}s with a blocked network -- timeout not bounded"; exit 1
          fi
          echo "OK: blocked network degrades silently, exit 0, within bound (${elapsed}s)"

  # Native PowerShell counterpart of session-start-freshness-check, same
  # reasoning as install-test-shared-hooks-windows-native.
  session-start-freshness-check-windows-native:
    name: session-start-freshness-check (windows-latest, native PowerShell)
    runs-on: windows-latest
    # Same GITHUB_TOKEN reasoning as session-start-freshness-check above.
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Silent states -- no marker, malformed marker, local-checkout sentinel
        shell: pwsh
        run: |
          $proj = Join-Path $env:RUNNER_TEMP "freshness-silent"
          New-Item -ItemType Directory -Force -Path (Join-Path $proj "scripts") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $proj ".specify") | Out-Null
          Copy-Item "scripts/session-start.ps1" (Join-Path $proj "scripts/session-start.ps1")

          $out = & (Join-Path $proj "scripts/session-start.ps1") | Out-String
          if ($out -match "Update available:") { Write-Host "FAIL: no-marker state produced a freshness line"; exit 1 }

          "not json" | Set-Content (Join-Path $proj ".specify/release-marker.json")
          $out = & (Join-Path $proj "scripts/session-start.ps1") | Out-String
          if ($out -match "Update available:") { Write-Host "FAIL: malformed-marker state produced a freshness line"; exit 1 }

          '{"installed_release": "local-checkout"}' | Set-Content (Join-Path $proj ".specify/release-marker.json")
          $out = & (Join-Path $proj "scripts/session-start.ps1") | Out-String
          if ($out -match "Update available:") { Write-Host "FAIL: local-checkout sentinel produced a freshness line"; exit 1 }
          Write-Host "OK: all three silent states produced no freshness line"
      - name: Stale marker surfaces the update line naming the real latest tag
        shell: pwsh
        run: |
          # specs/058-expand-shareable-hooks (FR-010 follow-up): same
          # retry reasoning as the bash counterpart of this step -- this
          # test depends on a live api.github.com call succeeding within
          # session-start.ps1's own deliberately tight timeout, so a
          # single transient miss is a CI environment flake, not a
          # regression, and gets retried before failing.
          $proj = Join-Path $env:RUNNER_TEMP "freshness-stale"
          New-Item -ItemType Directory -Force -Path (Join-Path $proj "scripts") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $proj ".specify") | Out-Null
          Copy-Item "scripts/session-start.ps1" (Join-Path $proj "scripts/session-start.ps1")
          '{"installed_release": "v0.0.0-definitely-stale"}' | Set-Content (Join-Path $proj ".specify/release-marker.json")

          $maxAttempts = 3
          $ok = $false
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              $out = & (Join-Path $proj "scripts/session-start.ps1") | Out-String
              if (($out -match [regex]::Escape("v0.0.0-definitely-stale installed")) -and
                  ($out -match [regex]::Escape("scripts/bootstrap-install.sh/.ps1")) -and
                  ($out -match [regex]::Escape("ask whether to update"))) {
                  Write-Host "OK: stale marker produces a correctly-worded update line (attempt $attempt/$maxAttempts)"
                  $ok = $true
                  break
              }
              if ($attempt -lt $maxAttempts) {
                  Write-Host "Attempt $attempt/$maxAttempts didn't get the expected update line (likely a transient api.github.com latency spike) -- retrying in 5s..."
                  Start-Sleep -Seconds 5
              } else {
                  Write-Host "FAIL: expected the stale-tag update line after $maxAttempts attempts, got: $out"
              }
          }
          if (-not $ok) { exit 1 }
      - name: Blocked network degrades silently and fast
        shell: pwsh
        run: |
          $proj = Join-Path $env:RUNNER_TEMP "freshness-blocked"
          New-Item -ItemType Directory -Force -Path (Join-Path $proj "scripts") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $proj ".specify") | Out-Null
          Copy-Item "scripts/session-start.ps1" (Join-Path $proj "scripts/session-start.ps1")
          '{"installed_release": "v0.0.0-network-blocked"}' | Set-Content (Join-Path $proj ".specify/release-marker.json")
          $env:http_proxy = "http://127.0.0.1:1"
          $env:https_proxy = "http://127.0.0.1:1"
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          & (Join-Path $proj "scripts/session-start.ps1") | Out-Null
          $exitCode = $LASTEXITCODE
          $sw.Stop()
          if ($exitCode -ne 0) { Write-Host "FAIL: session-start.ps1 exited $exitCode with a blocked network"; exit 1 }
          if ($sw.Elapsed.TotalSeconds -gt 10) { Write-Host "FAIL: session-start.ps1 took $($sw.Elapsed.TotalSeconds)s with a blocked network -- timeout not bounded"; exit 1 }
          Write-Host "OK: blocked network degrades silently, exit 0, within bound ($($sw.Elapsed.TotalSeconds)s)"

  # specs/041-release-hooks-settings (User Story 2, Wave 1): declarative-
  # JSON-hook harnesses -- gemini-cli/antigravity get a translated
  # BeforeTool hook (not a copy of Claude Code's own hooks shape);
  # codex-cli gets a hooks.json identical in shape to Claude Code's own
  # plus the required /hooks trust-workflow message.
  install-test-shared-hooks-wave1:
    name: install-test-shared-hooks-wave1 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Wave 1's translated dangerous-command-guard.sh covers the full FR-009 pattern set (US5, T039)
        shell: bash
        run: |
          # specs/058-expand-shareable-hooks (User Story 5): none of
          # Gemini CLI/Antigravity/Codex CLI have a confirmed hook
          # surface distinct from Bash/shell-command (specs/041
          # research.md), so secret-file-guard.sh is never translated
          # for them -- they instead rely on their existing translated
          # dangerous-command-guard.sh's own read_cmd check, which this
          # feature widened to the identical FR-009 pattern set (not a
          # silent, narrower subset) so that reliance claim is actually
          # true, not just documented.
          dir0=$(mktemp -d)
          ./scripts/install.sh "$dir0" --harness gemini-cli >/dev/null
          guard0="$dir0/.gemini/hooks/dangerous-command-guard.sh"
          out_npmrc=$(python3 -c "import json,sys; print(json.dumps({'tool_name':'Bash','tool_input':{'command':sys.argv[1]}}))" 'cat .npmrc' | "$guard0" || true)
          [ -n "$out_npmrc" ] || { echo "FAIL: .npmrc not blocked by Wave 1's translated guard"; exit 1; }
          out_aws=$(python3 -c "import json,sys; print(json.dumps({'tool_name':'Bash','tool_input':{'command':sys.argv[1]}}))" 'cat ~/.aws/credentials' | "$guard0" || true)
          [ -n "$out_aws" ] || { echo "FAIL: .aws/credentials not blocked by Wave 1's translated guard"; exit 1; }
          out_example=$(python3 -c "import json,sys; print(json.dumps({'tool_name':'Bash','tool_input':{'command':sys.argv[1]}}))" 'cat .env.example' | "$guard0" || true)
          [ -z "$out_example" ] || { echo "FAIL: .env.example wrongly blocked by Wave 1's translated guard"; exit 1; }
          echo "OK: Wave 1's translated dangerous-command-guard.sh covers the full FR-009 pattern set"
      - name: gemini-cli install produces a translated BeforeTool hook, not a copy of Claude Code's own hooks
        shell: bash
        run: |
          dir1=$(mktemp -d)
          ./scripts/install.sh "$dir1" --harness gemini-cli >/dev/null
          test -f "$dir1/.gemini/hooks/dangerous-command-guard.sh" || { echo "FAIL: dangerous-command-guard.sh missing"; exit 1; }
          test -f "$dir1/.gemini/hooks/prevent-direct-push.py" || { echo "FAIL: prevent-direct-push.py missing (specs/058 US1 Wave 1)"; exit 1; }
          grep -q '"BeforeTool"' "$dir1/.gemini/settings.json" || { echo "FAIL: BeforeTool hook missing"; exit 1; }
          if grep -q 'hookSpecificOutput' "$dir1/.gemini/hooks/dangerous-command-guard.sh"; then
            echo "FAIL: script still uses Claude Code's own output shape, not translated"
            exit 1
          fi
          grep -q '"decision"' "$dir1/.gemini/hooks/dangerous-command-guard.sh" || { echo "FAIL: translated decision/reason output shape missing"; exit 1; }
          if grep -q 'hookSpecificOutput' "$dir1/.gemini/hooks/prevent-direct-push.py"; then
            echo "FAIL: prevent-direct-push.py still uses Claude Code's own output shape, not translated"
            exit 1
          fi
          grep -q '"decision": "deny"' "$dir1/.gemini/hooks/prevent-direct-push.py" || { echo "FAIL: prevent-direct-push.py translated decision shape missing"; exit 1; }
          python3 -m json.tool "$dir1/.gemini/settings.json" >/dev/null || { echo "FAIL: settings.json not valid JSON"; exit 1; }
          grep -q "prevent-direct-push.py" "$dir1/.gemini/settings.json" || { echo "FAIL: prevent-direct-push.py not wired into BeforeTool"; exit 1; }
          test -f "$dir1/.gemini/hooks/secret-scanner.py" || { echo "FAIL: secret-scanner.py missing (specs/058 US2 Wave 1)"; exit 1; }
          test -f "$dir1/.gemini/hooks/secret-scanner-wrapper.py" || { echo "FAIL: secret-scanner-wrapper.py missing (specs/058 US2 Wave 1)"; exit 1; }
          grep -q "secret-scanner-wrapper.py" "$dir1/.gemini/settings.json" || { echo "FAIL: secret-scanner-wrapper.py not wired into BeforeTool"; exit 1; }
          echo "OK: gemini-cli hooks translated, not copied"
      - name: antigravity install produces a translated hook in its own confirmed settings location
        shell: bash
        run: |
          dir2=$(mktemp -d)
          ./scripts/install.sh "$dir2" --harness antigravity >/dev/null
          test -f "$dir2/.agents/hooks/dangerous-command-guard.sh" || { echo "FAIL: dangerous-command-guard.sh missing"; exit 1; }
          test -f "$dir2/.agents/hooks/prevent-direct-push.py" || { echo "FAIL: prevent-direct-push.py missing (specs/058 US1 Wave 1)"; exit 1; }
          grep -q '"BeforeTool"' "$dir2/.agents/hooks.json" || { echo "FAIL: BeforeTool hook missing"; exit 1; }
          grep -q "prevent-direct-push.py" "$dir2/.agents/hooks.json" || { echo "FAIL: prevent-direct-push.py not wired into BeforeTool"; exit 1; }
          test -f "$dir2/.agents/hooks/secret-scanner-wrapper.py" || { echo "FAIL: secret-scanner-wrapper.py missing (specs/058 US2 Wave 1)"; exit 1; }
          grep -q "secret-scanner-wrapper.py" "$dir2/.agents/hooks.json" || { echo "FAIL: secret-scanner-wrapper.py not wired into BeforeTool"; exit 1; }
          python3 -m json.tool "$dir2/.agents/hooks.json" >/dev/null || { echo "FAIL: hooks.json not valid JSON"; exit 1; }
          echo "OK: antigravity hooks.json present and valid"
      - name: codex-cli install produces hooks.json and tells the user to run /hooks to trust it
        shell: bash
        run: |
          dir3=$(mktemp -d)
          out=$(./scripts/install.sh "$dir3" --harness codex-cli)
          test -f "$dir3/.codex/hooks/dangerous-command-guard.sh" || { echo "FAIL: dangerous-command-guard.sh missing"; exit 1; }
          test -f "$dir3/.codex/hooks/prevent-direct-push.py" || { echo "FAIL: prevent-direct-push.py missing (specs/058 US1 Wave 1)"; exit 1; }
          grep -q '"PreToolUse"' "$dir3/.codex/hooks.json" || { echo "FAIL: PreToolUse hook missing"; exit 1; }
          grep -q "prevent-direct-push.py" "$dir3/.codex/hooks.json" || { echo "FAIL: prevent-direct-push.py not wired into PreToolUse"; exit 1; }
          test -f "$dir3/.codex/hooks/secret-scanner.py" || { echo "FAIL: secret-scanner.py missing (specs/058 US2 Wave 1)"; exit 1; }
          grep -q "secret-scanner.py" "$dir3/.codex/hooks.json" || { echo "FAIL: secret-scanner.py not wired into PreToolUse"; exit 1; }
          python3 -m json.tool "$dir3/.codex/hooks.json" >/dev/null || { echo "FAIL: hooks.json not valid JSON"; exit 1; }
          echo "$out" | grep -q '/hooks' || { echo "FAIL: trust-workflow message missing"; exit 1; }
          echo "$out" | grep -q "prevent-direct-push.py secret-scanner.py before they actually run" || { echo "FAIL: trust-workflow message doesn't name both hooks"; exit 1; }
          echo "OK: codex-cli hooks.json present, trust-workflow message shown"
      - name: conventional-commits.py opt-in translates correctly for all three Wave 1 harnesses (US3, T043)
        shell: bash
        run: |
          dir_gemini=$(mktemp -d)
          printf '\ny\n\n' | SPECJEDI_TEST_FORCE_HOOKS_PROMPT=1 ./scripts/install.sh "$dir_gemini" --harness gemini-cli >/dev/null
          test -f "$dir_gemini/.gemini/hooks/conventional-commits.py" || { echo "FAIL: conventional-commits.py missing (gemini-cli)"; exit 1; }
          if grep -q 'hookSpecificOutput' "$dir_gemini/.gemini/hooks/conventional-commits.py"; then
            echo "FAIL: conventional-commits.py still uses Claude Code's own output shape, not translated (gemini-cli)"
            exit 1
          fi
          grep -q '"decision": "deny"' "$dir_gemini/.gemini/hooks/conventional-commits.py" || { echo "FAIL: conventional-commits.py translated decision shape missing (gemini-cli)"; exit 1; }
          grep -q "conventional-commits.py" "$dir_gemini/.gemini/settings.json" || { echo "FAIL: conventional-commits.py not wired into BeforeTool (gemini-cli)"; exit 1; }

          dir_antigravity=$(mktemp -d)
          printf '\ny\n\n' | SPECJEDI_TEST_FORCE_HOOKS_PROMPT=1 ./scripts/install.sh "$dir_antigravity" --harness antigravity >/dev/null
          test -f "$dir_antigravity/.agents/hooks/conventional-commits.py" || { echo "FAIL: conventional-commits.py missing (antigravity)"; exit 1; }
          grep -q "conventional-commits.py" "$dir_antigravity/.agents/hooks.json" || { echo "FAIL: conventional-commits.py not wired into BeforeTool (antigravity)"; exit 1; }

          dir_codex=$(mktemp -d)
          codex_out=$(printf '\ny\n\n' | SPECJEDI_TEST_FORCE_HOOKS_PROMPT=1 ./scripts/install.sh "$dir_codex" --harness codex-cli)
          test -f "$dir_codex/.codex/hooks/conventional-commits.py" || { echo "FAIL: conventional-commits.py missing (codex-cli)"; exit 1; }
          grep -q "conventional-commits.py" "$dir_codex/.codex/hooks.json" || { echo "FAIL: conventional-commits.py not wired into PreToolUse (codex-cli)"; exit 1; }
          echo "$codex_out" | grep -q "prevent-direct-push.py secret-scanner.py conventional-commits.py before they actually run" || { echo "FAIL: trust-workflow message doesn't name conventional-commits.py when opted in (T057)"; exit 1; }

          dir_declined=$(mktemp -d)
          printf '\nn\n\n' | SPECJEDI_TEST_FORCE_HOOKS_PROMPT=1 ./scripts/install.sh "$dir_declined" --harness gemini-cli >/dev/null
          if [ -f "$dir_declined/.gemini/hooks/conventional-commits.py" ]; then
            echo "FAIL: conventional-commits.py installed despite the default-declined answer (gemini-cli)"; exit 1
          fi
          echo "OK: conventional-commits.py opt-in translates correctly for all three Wave 1 harnesses"
      - name: Idempotent re-run produces byte-identical output for all three Wave 1 harnesses
        shell: bash
        run: |
          for h in gemini-cli antigravity codex-cli; do
            dir=$(mktemp -d)
            ./scripts/install.sh "$dir" --harness "$h" >/dev/null
            case "$h" in
              gemini-cli) f="$dir/.gemini/settings.json" ;;
              antigravity) f="$dir/.agents/hooks.json" ;;
              codex-cli) f="$dir/.codex/hooks.json" ;;
            esac
            cp "$f" "/tmp/before-$h.json"
            ./scripts/install.sh "$dir" --harness "$h" >/dev/null
            diff "/tmp/before-$h.json" "$f" || { echo "FAIL: $h output changed on re-run"; exit 1; }
          done
          echo "OK: idempotent re-run for all Wave 1 harnesses"

  # Native PowerShell counterpart of install-test-shared-hooks-wave1, same
  # reasoning as install-test-shared-hooks-windows-native.
  install-test-shared-hooks-wave1-windows-native:
    name: install-test-shared-hooks-wave1 (windows-latest, native PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: gemini-cli install produces a translated BeforeTool hook, not a copy of Claude Code's own hooks
        shell: pwsh
        run: |
          $dir1 = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          ./scripts/install.ps1 -TargetDir $dir1 -Harness gemini-cli | Out-Null
          if (-not (Test-Path (Join-Path $dir1 ".gemini/hooks/dangerous-command-guard.ps1"))) { Write-Host "FAIL: dangerous-command-guard.ps1 missing"; exit 1 }
          if (-not (Test-Path (Join-Path $dir1 ".gemini/hooks/prevent-direct-push.py"))) { Write-Host "FAIL: prevent-direct-push.py missing (specs/058 US1 Wave 1)"; exit 1 }
          if (-not (Test-Path (Join-Path $dir1 ".gemini/hooks/secret-scanner-wrapper.py"))) { Write-Host "FAIL: secret-scanner-wrapper.py missing (specs/058 US2 Wave 1)"; exit 1 }
          $settings = Get-Content (Join-Path $dir1 ".gemini/settings.json") -Raw
          if ($settings -notmatch '"BeforeTool"') { Write-Host "FAIL: BeforeTool hook missing"; exit 1 }
          if ($settings -notmatch 'secret-scanner-wrapper.py') { Write-Host "FAIL: secret-scanner-wrapper.py not wired"; exit 1 }
          $null = $settings | ConvertFrom-Json
          $hookContent = Get-Content (Join-Path $dir1 ".gemini/hooks/dangerous-command-guard.ps1") -Raw
          if ($hookContent -match 'hookSpecificOutput') { Write-Host "FAIL: script still uses Claude Code's own output shape"; exit 1 }
          if ($hookContent -notmatch '"decision"') { Write-Host "FAIL: translated decision/reason output shape missing"; exit 1 }
          $pushContent = Get-Content (Join-Path $dir1 ".gemini/hooks/prevent-direct-push.py") -Raw
          if ($pushContent -notmatch '"decision": "deny"') { Write-Host "FAIL: prevent-direct-push.py translated decision shape missing"; exit 1 }
          Write-Host "OK: gemini-cli hooks translated, not copied"
      - name: antigravity install produces a translated hook in its own confirmed settings location
        shell: pwsh
        run: |
          $dir2 = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          ./scripts/install.ps1 -TargetDir $dir2 -Harness antigravity | Out-Null
          if (-not (Test-Path (Join-Path $dir2 ".agents/hooks/dangerous-command-guard.ps1"))) { Write-Host "FAIL: dangerous-command-guard.ps1 missing"; exit 1 }
          if (-not (Test-Path (Join-Path $dir2 ".agents/hooks/secret-scanner-wrapper.py"))) { Write-Host "FAIL: secret-scanner-wrapper.py missing (specs/058 US2 Wave 1)"; exit 1 }
          $hooks = Get-Content (Join-Path $dir2 ".agents/hooks.json") -Raw
          if ($hooks -notmatch '"BeforeTool"') { Write-Host "FAIL: BeforeTool hook missing"; exit 1 }
          if ($hooks -notmatch 'secret-scanner-wrapper.py') { Write-Host "FAIL: secret-scanner-wrapper.py not wired"; exit 1 }
          $null = $hooks | ConvertFrom-Json
          Write-Host "OK: antigravity hooks.json present and valid"
      - name: codex-cli install produces hooks.json and tells the user to run /hooks to trust it
        shell: pwsh
        run: |
          $dir3 = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          $out = ./scripts/install.ps1 -TargetDir $dir3 -Harness codex-cli 6>&1
          if (-not (Test-Path (Join-Path $dir3 ".codex/hooks/dangerous-command-guard.ps1"))) { Write-Host "FAIL: dangerous-command-guard.ps1 missing"; exit 1 }
          if (-not (Test-Path (Join-Path $dir3 ".codex/hooks/secret-scanner.py"))) { Write-Host "FAIL: secret-scanner.py missing (specs/058 US2 Wave 1)"; exit 1 }
          $hooks = Get-Content (Join-Path $dir3 ".codex/hooks.json") -Raw
          if ($hooks -notmatch '"PreToolUse"') { Write-Host "FAIL: PreToolUse hook missing"; exit 1 }
          if ($hooks -notmatch 'secret-scanner.py') { Write-Host "FAIL: secret-scanner.py not wired"; exit 1 }
          $null = $hooks | ConvertFrom-Json
          if (($out -join "`n") -notmatch '/hooks') { Write-Host "FAIL: trust-workflow message missing"; exit 1 }
          if (($out -join "`n") -notmatch 'prevent-direct-push.py secret-scanner.py before they actually run') { Write-Host "FAIL: trust-workflow message doesn't name both hooks"; exit 1 }
          Write-Host "OK: codex-cli hooks.json present, trust-workflow message shown"
      - name: conventional-commits.py opt-in translates correctly for all three Wave 1 harnesses (US3, T043)
        shell: pwsh
        run: |
          $env:SPECJEDI_TEST_FORCE_HOOKS_PROMPT = "1"

          $dirGemini = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          "`ny`n`n" | & pwsh -NoProfile -File ./scripts/install.ps1 -TargetDir $dirGemini -Harness gemini-cli | Out-Null
          if (-not (Test-Path (Join-Path $dirGemini ".gemini/hooks/conventional-commits.py"))) { Write-Host "FAIL: conventional-commits.py missing (gemini-cli)"; exit 1 }
          $commitContent = Get-Content (Join-Path $dirGemini ".gemini/hooks/conventional-commits.py") -Raw
          if ($commitContent -match 'hookSpecificOutput') { Write-Host "FAIL: conventional-commits.py still uses Claude Code's own output shape, not translated (gemini-cli)"; exit 1 }
          if ($commitContent -notmatch '"decision": "deny"') { Write-Host "FAIL: conventional-commits.py translated decision shape missing (gemini-cli)"; exit 1 }
          $geminiSettings = Get-Content (Join-Path $dirGemini ".gemini/settings.json") -Raw
          if ($geminiSettings -notmatch 'conventional-commits.py') { Write-Host "FAIL: conventional-commits.py not wired into BeforeTool (gemini-cli)"; exit 1 }

          $dirAntigravity = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          "`ny`n`n" | & pwsh -NoProfile -File ./scripts/install.ps1 -TargetDir $dirAntigravity -Harness antigravity | Out-Null
          if (-not (Test-Path (Join-Path $dirAntigravity ".agents/hooks/conventional-commits.py"))) { Write-Host "FAIL: conventional-commits.py missing (antigravity)"; exit 1 }
          $antigravityHooks = Get-Content (Join-Path $dirAntigravity ".agents/hooks.json") -Raw
          if ($antigravityHooks -notmatch 'conventional-commits.py') { Write-Host "FAIL: conventional-commits.py not wired into BeforeTool (antigravity)"; exit 1 }

          $dirCodex = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          $codexOut = "`ny`n`n" | & pwsh -NoProfile -File ./scripts/install.ps1 -TargetDir $dirCodex -Harness codex-cli
          if (-not (Test-Path (Join-Path $dirCodex ".codex/hooks/conventional-commits.py"))) { Write-Host "FAIL: conventional-commits.py missing (codex-cli)"; exit 1 }
          $codexHooks = Get-Content (Join-Path $dirCodex ".codex/hooks.json") -Raw
          if ($codexHooks -notmatch 'conventional-commits.py') { Write-Host "FAIL: conventional-commits.py not wired into PreToolUse (codex-cli)"; exit 1 }
          if (($codexOut -join "`n") -notmatch 'prevent-direct-push.py secret-scanner.py conventional-commits.py before they actually run') { Write-Host "FAIL: trust-workflow message doesn't name conventional-commits.py when opted in (T057)"; exit 1 }

          $dirDeclined = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          "`nn`n`n" | & pwsh -NoProfile -File ./scripts/install.ps1 -TargetDir $dirDeclined -Harness gemini-cli | Out-Null
          if (Test-Path (Join-Path $dirDeclined ".gemini/hooks/conventional-commits.py")) { Write-Host "FAIL: conventional-commits.py installed despite the default-declined answer (gemini-cli)"; exit 1 }

          Write-Host "OK: conventional-commits.py opt-in translates correctly for all three Wave 1 harnesses"

  # specs/041-release-hooks-settings (User Story 2, Wave 2): permissions-
  # only harnesses -- opencode/zed/amazon-q get a real, harness-native
  # permissions translation; warp gets an honest advisory (no confirmed
  # project-scoped mechanism to write into non-destructively, see
  # install_permissions_warp's own comment in scripts/install.sh).
  install-test-shared-hooks-wave2:
    name: install-test-shared-hooks-wave2 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: opencode install produces translated allow/ask/deny rules in opencode.json
        shell: bash
        run: |
          dir1=$(mktemp -d)
          ./scripts/install.sh "$dir1" --harness opencode >/dev/null
          test -f "$dir1/opencode.json" || { echo "FAIL: opencode.json missing"; exit 1; }
          grep -q '"permission"' "$dir1/opencode.json" || { echo "FAIL: permission key missing"; exit 1; }
          grep -q '"bash"' "$dir1/opencode.json" || { echo "FAIL: bash rules missing"; exit 1; }
          python3 -m json.tool "$dir1/opencode.json" >/dev/null || { echo "FAIL: opencode.json not valid JSON"; exit 1; }
          echo "OK: opencode.json permissions present and valid"
      - name: zed install produces translated tool-permission settings
        shell: bash
        run: |
          dir2=$(mktemp -d)
          ./scripts/install.sh "$dir2" --harness zed >/dev/null
          test -f "$dir2/.zed/settings.json" || { echo "FAIL: .zed/settings.json missing"; exit 1; }
          grep -q '"tool_permissions"' "$dir2/.zed/settings.json" || { echo "FAIL: tool_permissions missing"; exit 1; }
          python3 -m json.tool "$dir2/.zed/settings.json" >/dev/null || { echo "FAIL: settings.json not valid JSON"; exit 1; }
          echo "OK: .zed/settings.json tool_permissions present and valid"
      - name: warp install prints an honest advisory, writes no file (no confirmed project-scoped mechanism)
        shell: bash
        run: |
          dir3=$(mktemp -d)
          out=$(./scripts/install.sh "$dir3" --harness warp)
          echo "$out" | grep -qi "global" || { echo "FAIL: advisory message missing"; exit 1; }
          if find "$dir3" -iname "*.toml" | grep -q .; then
            echo "FAIL: unexpectedly wrote a file"
            exit 1
          fi
          echo "OK: warp advisory shown, no file written"
      - name: amazon-q install produces a custom agent JSON with allowedTools
        shell: bash
        run: |
          dir4=$(mktemp -d)
          ./scripts/install.sh "$dir4" --harness amazon-q >/dev/null
          test -f "$dir4/.amazonq/cli-agents/spec-jedi-shared.json" || { echo "FAIL: custom agent JSON missing"; exit 1; }
          grep -q '"allowedTools"' "$dir4/.amazonq/cli-agents/spec-jedi-shared.json" || { echo "FAIL: allowedTools missing"; exit 1; }
          python3 -m json.tool "$dir4/.amazonq/cli-agents/spec-jedi-shared.json" >/dev/null || { echo "FAIL: agent JSON not valid"; exit 1; }
          echo "OK: amazon-q custom agent JSON present and valid"
      - name: Idempotent re-run produces byte-identical output for opencode/zed/amazon-q
        shell: bash
        run: |
          for h in opencode zed amazon-q; do
            dir=$(mktemp -d)
            ./scripts/install.sh "$dir" --harness "$h" >/dev/null
            case "$h" in
              opencode) f="$dir/opencode.json" ;;
              zed) f="$dir/.zed/settings.json" ;;
              amazon-q) f="$dir/.amazonq/cli-agents/spec-jedi-shared.json" ;;
            esac
            cp "$f" "/tmp/before2-$h.json"
            ./scripts/install.sh "$dir" --harness "$h" >/dev/null
            diff "/tmp/before2-$h.json" "$f" || { echo "FAIL: $h output changed on re-run"; exit 1; }
          done
          echo "OK: idempotent re-run for opencode/zed/amazon-q"

  # Native PowerShell counterpart of install-test-shared-hooks-wave2, same
  # reasoning as install-test-shared-hooks-windows-native.
  install-test-shared-hooks-wave2-windows-native:
    name: install-test-shared-hooks-wave2 (windows-latest, native PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: opencode install produces translated allow/ask/deny rules in opencode.json
        shell: pwsh
        run: |
          $dir1 = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          ./scripts/install.ps1 -TargetDir $dir1 -Harness opencode | Out-Null
          if (-not (Test-Path (Join-Path $dir1 "opencode.json"))) { Write-Host "FAIL: opencode.json missing"; exit 1 }
          $content = Get-Content (Join-Path $dir1 "opencode.json") -Raw
          if ($content -notmatch '"permission"') { Write-Host "FAIL: permission key missing"; exit 1 }
          $null = $content | ConvertFrom-Json
          Write-Host "OK: opencode.json permissions present and valid"
      - name: zed install produces translated tool-permission settings
        shell: pwsh
        run: |
          $dir2 = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          ./scripts/install.ps1 -TargetDir $dir2 -Harness zed | Out-Null
          if (-not (Test-Path (Join-Path $dir2 ".zed/settings.json"))) { Write-Host "FAIL: .zed/settings.json missing"; exit 1 }
          $content = Get-Content (Join-Path $dir2 ".zed/settings.json") -Raw
          if ($content -notmatch '"tool_permissions"') { Write-Host "FAIL: tool_permissions missing"; exit 1 }
          $null = $content | ConvertFrom-Json
          Write-Host "OK: .zed/settings.json tool_permissions present and valid"
      - name: warp install prints an honest advisory, writes no file
        shell: pwsh
        run: |
          $dir3 = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          $out = ./scripts/install.ps1 -TargetDir $dir3 -Harness warp 6>&1
          if (($out -join "`n") -notmatch '(?i)global') { Write-Host "FAIL: advisory message missing"; exit 1 }
          if (Test-Path $dir3) {
            $tomlFiles = Get-ChildItem -Path $dir3 -Recurse -Filter "*.toml" -ErrorAction SilentlyContinue
            if ($tomlFiles) { Write-Host "FAIL: unexpectedly wrote a file"; exit 1 }
          }
          Write-Host "OK: warp advisory shown, no file written"
      - name: amazon-q install produces a custom agent JSON with allowedTools
        shell: pwsh
        run: |
          $dir4 = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName())
          ./scripts/install.ps1 -TargetDir $dir4 -Harness amazon-q | Out-Null
          $agentFile = Join-Path $dir4 ".amazonq/cli-agents/spec-jedi-shared.json"
          if (-not (Test-Path $agentFile)) { Write-Host "FAIL: custom agent JSON missing"; exit 1 }
          $content = Get-Content $agentFile -Raw
          if ($content -notmatch '"allowedTools"') { Write-Host "FAIL: allowedTools missing"; exit 1 }
          $null = $content | ConvertFrom-Json
          Write-Host "OK: amazon-q custom agent JSON present and valid"

  # Add new battery jobs here as the project grows (unit, integration,
  # e2e/Playwright, etc. — Constitution Principle IX) and list each one
  # under ci-gate's `needs:` below. Branch protection only ever requires
  # `ci-gate`, so it never needs reconfiguring when the battery changes.

  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    needs: [lint, lint-windows-native, install-test, install-test-windows-native, install-test-codex-cli, install-test-codex-cli-windows-native, install-test-trae, install-test-trae-windows-native, install-test-antigravity, install-test-antigravity-windows-native, install-test-bridge-harnesses, install-test-bridge-harnesses-windows-native, install-test-shared-hooks, install-test-shared-hooks-windows-native, install-test-release-marker, install-test-release-marker-windows-native, install-test-shared-hooks-wave1, install-test-shared-hooks-wave1-windows-native, install-test-shared-hooks-wave2, install-test-shared-hooks-wave2-windows-native, session-start-freshness-check, session-start-freshness-check-windows-native, harness-auto-detect, harness-auto-detect-windows-native, opencode-compatibility, warp-compatibility, bootstrap-installer-smoke, package-content-completeness, memory-file-injection, owner-gate, tokencheck-detection, tokencheck-detection-windows-native]
    if: always()
    steps:
      - name: Require every battery job to have succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more validation battery jobs did not succeed."
            exit 1
          fi
          echo "Full validation battery passed."
